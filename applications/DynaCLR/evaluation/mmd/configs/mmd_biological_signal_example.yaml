# Example: biological signal — ZIKV vs uninfected per organelle per timepoint
# Both groups come from the same zarr (condition filter on obs)

zarr_a: /hpc/projects/intracellular_dashboard/organelle_box/2026_03_10_A549_strong_organelles_DENV_ZIKV_time_course/5-phenotyping/predictions/DynaCLR-2D-BagOfChannels-timeaware/v3/organelle_223patch_104ckpt.zarr
# zarr_b omitted — same zarr used for both groups

filter_a:
  column: fov_name
  startswith:
    - "G3BP1/uninfected"

filter_b:
  column: fov_name
  startswith:
    - "G3BP1/ZIKV"

group_by:
  - t

use_pca: true
n_pca: 50
n_perm: 0        # set to 1000 for p-values (slower)
max_cells: 2000
random_seed: 42

output_csv: /tmp/mmd_test/mmd_biological_signal.csv
