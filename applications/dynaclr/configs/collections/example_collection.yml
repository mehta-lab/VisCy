# Example collection YAML for multi-experiment DynaCLR training
# =============================================================
# This file is generated from Airtable MCP queries at curation time.
# It is git-tracked as the versioned record of what went into a training run.
#
# Usage:
#   - Reference this in multi_experiment_fit.yml as collection_path
#   - Build cell index: python -m viscy_data.cell_index --collection collection.yml --output cell_index.parquet

name: example_organelle_dynamics
description: "Phase + fluorescence reporter across 2 experiments"

provenance:
  airtable_base_id: null
  airtable_query: null
  record_ids: []
  created_at: null
  created_by: null

source_channels:
  - label: labelfree
    per_experiment:
      exp_alpha: Phase3D
      exp_beta: Phase3D
  - label: reporter
    per_experiment:
      exp_alpha: raw GFP EX488 EM525-45
      exp_beta: raw RFP EX561 EM600-50

experiments:
  - name: exp_alpha
    data_path: /path/to/exp_alpha.zarr
    tracks_path: /path/to/tracks_alpha
    channel_names:
      - Phase3D
      - raw GFP EX488 EM525-45
      - raw Mito EX561 EM600-50
    perturbation_wells:
      uninfected:
        - A/1
        - A/2
      infected:
        - B/1
        - B/2
    interval_minutes: 30.0
    start_hpi: 0.0
    marker: SEC61B
    organelle: endoplasmic_reticulum
    date: "2025-01-15"
    moi: 0.5
    exclude_fovs: []

  - name: exp_beta
    data_path: /path/to/exp_beta.zarr
    tracks_path: /path/to/tracks_beta
    channel_names:
      - Phase3D
      - raw RFP EX561 EM600-50
      - raw StressGranules EX488 EM525-45
    perturbation_wells:
      uninfected:
        - A/1
      infected:
        - B/1
    interval_minutes: 15.0
    start_hpi: 2.0
    marker: G3BP1
    organelle: stress_granules
    date: "2025-02-20"
    moi: 1.0
    exclude_fovs: []
