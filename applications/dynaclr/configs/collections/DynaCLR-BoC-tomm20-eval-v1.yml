name: DynaCLR-BoC-tomm20-eval-v1
description: "TOMM20-only evaluation collection for bag-of-channels DynaCLR models on infectomics ZIKV/DENV datasets.
  One experiment per (dataset x TOMM20 channel) covering both uninfected and infected wells. No annotations.
  Used to produce per-experiment embedding zarrs (predict -> split -> reduce_dimensionality -> smoothness)."
datasets_root: /hpc/projects/organelle_phenotyping

provenance:
  airtable_base_id: app8vqaoWyOwa0sB5
  airtable_query: "OR(SEARCH(\"2024_10_09_A549_TOMM20_ZIKV_DENV\", {dataset}), SEARCH(\"2024_11_05_A549_TOMM20_ZIKV_DENV\", {dataset}), SEARCH(\"2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV\", {dataset}))"
  record_ids: []
  created_at: "2026-05-18T00:00:00"
  created_by: "eduardo.hirata"

experiments:
  # ── 2024_10_09: TOMM20 (mitochondria), ZIKV + DENV ──
  - name: 2024_10_09_A549_TOMM20_ZIKV_DENV_TOMM20
    data_path: ${datasets_root}/datasets/2024_10_09_A549_TOMM20_ZIKV_DENV/2024_10_09_A549_TOMM20_ZIKV_DENV.zarr
    tracks_path: ${datasets_root}/datasets/2024_10_09_A549_TOMM20_ZIKV_DENV/tracking.zarr
    channels:
      - name: raw GFP EX488 EM525-45
        marker: TOMM20
    perturbation_wells:
      uninfected:
        - A/4
      infected:
        - B/4
    interval_minutes: 30.0
    start_hpi: 5.0
    marker: TOMM20
    organelle: mitochondria
    moi: 5.0
    pixel_size_xy_um: 0.1494
    pixel_size_z_um: 0.174

  # ── 2024_11_05: TOMM20 (mitochondria), ZIKV + DENV ──
  - name: 2024_11_05_A549_TOMM20_ZIKV_DENV_TOMM20
    data_path: ${datasets_root}/datasets/2024_11_05_A549_TOMM20_ZIKV_DENV/2024_11_05_A549_TOMM20_ZIKV_DENV.zarr
    tracks_path: ${datasets_root}/datasets/2024_11_05_A549_TOMM20_ZIKV_DENV/tracking.zarr
    channels:
      - name: raw GFP EX488 EM525-45
        marker: TOMM20
    perturbation_wells:
      uninfected:
        - B/4
      infected:
        - C/4
    interval_minutes: 30.0
    start_hpi: 4.5
    marker: TOMM20
    organelle: mitochondria
    moi: 5.0
    pixel_size_xy_um: 0.1494
    pixel_size_z_um: 0.174

  # ── 2025_07_24: TOMM20 (mitochondria), ZIKV ──
  # Same plate as SEC61 (A wells) and G3BP1 (C wells); TOMM20 lives on B wells (GFP channel).
  - name: 2025_07_24_A549_TOMM20_ZIKV
    data_path: ${datasets_root}/datasets/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV.zarr
    tracks_path: ${datasets_root}/datasets/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV/tracking.zarr
    channels:
      - name: raw GFP EX488 EM525-45
        marker: TOMM20
    perturbation_wells:
      uninfected:
        - B/1
      infected:
        - B/2
    interval_minutes: 30.0
    start_hpi: 3.5
    marker: TOMM20
    organelle: mitochondria
    moi: 5.0
    pixel_size_xy_um: 0.1494
    pixel_size_z_um: 0.174
