name: A549_bag_of_channels
description: >-
  Bag-of-channels collection for contrastive learning across 8 experiments.
  Pools phase, GFP, mCherry, and Cy5 channels from G3BP1, H2B/CAAX,
  TOMM20, SEC61B, and multi-organelle datasets. Single-channel input
  (in_channels=1) with random channel selection per sample.

