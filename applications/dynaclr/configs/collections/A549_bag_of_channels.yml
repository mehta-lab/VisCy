  airtable_base_id: app8vqaoWyOwa0sB5
  airtable_query: >-
    OR(
      SEARCH("2025_01_28_A549_G3BP1", {dataset}),
      SEARCH("2025_04_15_A549_H2B_CAAX", {dataset}),
      SEARCH("2025_04_17_A549_H2B_CAAX", {dataset}),
      SEARCH("2024_10_09_A549_TOMM20", {dataset}),
      SEARCH("2024_11_05_A549_TOMM20", {dataset}),
      SEARCH("2024_10_16_A549_SEC61", {dataset}),
      SEARCH("2024_10_31_A549_SEC61", {dataset}),
      SEARCH("2025_07_24_A549_SEC61_TOMM20_G3BP1", {dataset})
    )
  record_ids: []
  created_at: "2026-03-13"
  created_by: eduardo.hirata

