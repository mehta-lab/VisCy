name: DynaCLR-2D-MIP-BagOfChannels-MultiCell
description: "Multi-cell-type bag-of-channels 2D DynaCLR training collection with z-reduction. Combines A549 infectomics (3D z-stacks from VAST, MIP for fluorescence / center-slice for Phase3D), microglia dynamorph (BF, Phase3D, Retardance), ALFI mitosis (DIC, U2OS/RPE-1/HeLa), and dragonfly confocal. All data paths point to /hpc/projects/organelle_phenotyping/datasets/."
datasets_root: /hpc/projects/organelle_phenotyping

provenance:
  airtable_base_id: app8vqaoWyOwa0sB5
  airtable_query: "OR(SEARCH(\"2024_10_09_A549_TOMM20_ZIKV_DENV\", {dataset}), SEARCH(\"2024_11_05_A549_TOMM20_ZIKV_DENV\", {dataset}), SEARCH(\"2024_10_16_A549_SEC61_ZIKV_DENV\", {dataset}), SEARCH(\"2024_10_31_A549_SEC61_ZIKV_DENV\", {dataset}), SEARCH(\"2025_01_28_A549_G3BP1_ZIKV_DENV\", {dataset}), SEARCH(\"2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV\", {dataset}), SEARCH(\"2025_04_15_A549_H2B_CAAX_ZIKV_DENV\", {dataset}), SEARCH(\"2025_04_17_A549_H2B_CAAX_DENV\", {dataset}), SEARCH(\"2024_08_14_ZIKV_pal17_48h\", {dataset}), SEARCH(\"20191107_1209_1_GW23_dynamorph\", {dataset}), SEARCH(\"ALFI\", {dataset}))"
  record_ids: []
  created_at: "2026-03-30T00:00:00"
  created_by: "eduardo.hirata"

