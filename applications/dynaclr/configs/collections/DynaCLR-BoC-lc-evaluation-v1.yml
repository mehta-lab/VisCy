name: DynaCLR-BoC-lc-evaluation-v1
description: "Annotated experiments for linear classifier evaluation of bag-of-channels DynaCLR models.
  Includes all datasets with infection_state / cell_division_state annotations and processed zarr stores."
datasets_root: /hpc/projects/organelle_phenotyping

provenance:
  airtable_base_id: app8vqaoWyOwa0sB5
  airtable_query: "OR(SEARCH(\"2024_11_07\", {dataset}), SEARCH(\"2025_01_24\", {dataset}), SEARCH(\"2025_01_28_A549_G3BP1_ZIKV_DENV\", {dataset}), SEARCH(\"2025_07_22\", {dataset}), SEARCH(\"2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV\", {dataset}), SEARCH(\"2025_08_26\", {dataset}))"
  record_ids: []
  created_at: "2026-04-09T00:00:00"
  created_by: "eduardo.hirata"

experiments:
  # ── 2025_01_28: G3BP1 (stress granules), ZIKV + DENV ──
  # Annotated wells: B/4 (uninfected), C/4 (infected)
  - name: 2025_01_28_A549_G3BP1_ZIKV_DENV_G3BP1
    data_path: ${datasets_root}/datasets/2025_01_28_A549_G3BP1_ZIKV_DENV/2025_01_28_A549_G3BP1_ZIKV_DENV.zarr
    tracks_path: ${datasets_root}/datasets/2025_01_28_A549_G3BP1_ZIKV_DENV/tracking.zarr
    channels:
      - name: raw GFP EX488 EM525-45
        marker: G3BP1
    perturbation_wells:
      uninfected:
        - B/4
      infected:
        - B/2
        - C/4
    interval_minutes: 30.0
    start_hpi: 4.0
    marker: G3BP1
    organelle: stress_granules
    moi: 5.0
    pixel_size_xy_um: 0.1494
    pixel_size_z_um: 0.174

