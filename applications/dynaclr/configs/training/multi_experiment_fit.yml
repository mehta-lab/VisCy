# Multi-experiment DynaCLR training configuration
# ================================================
# This config demonstrates training with MultiExperimentDataModule
# and NTXentHCL loss across multiple experiments with different
# fluorescence reporters but shared phase contrast channel.
#
# Key differences from fit.yml:
# 1. data.class_path uses MultiExperimentDataModule (not TripletDataModule)
# 2. loss_function uses NTXentHCL (not TripletMarginLoss)
# 3. use_distributed_sampler: false (FlexibleBatchSampler handles DDP)
# 4. Normalizations/augmentations use channel_0 for bag-of-channels mode
# 5. All sampling axes configured: batch_group_by, stratify_by,
#    temporal_enrichment
#
# Run-specific paths — set these before launching:
#   RUN_DIR:  root output directory for this run, e.g. /hpc/projects/.../runs/my_run_v1
#             checkpoints and WandB local cache all live here.
#   RUN_NAME: short label that appears in WandB and directory names.
#
# Override at launch (or set _run_dir below):
#   dynaclr fit --config multi_experiment_fit.yml \
#     --trainer.logger.init_args.name=my_run_v1 \
#     --trainer.logger.init_args.save_dir=/hpc/projects/.../runs/my_run_v1 \
#     --trainer.callbacks[1].init_args.dirpath=/hpc/projects/.../runs/my_run_v1/checkpoints
#
# Usage:
#   dynaclr fit --config multi_experiment_fit.yml
#
# Requires a collection YAML (see configs/collection/) with experiment definitions.

_run_dir: &run_dir /hpc/projects/TODO/runs/TODO_run_name  # set this

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: ddp
  devices: 4
  num_nodes: 1
  precision: 32-true
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      entity: computational_imaging
      project: dynaclr
      name: TODO_run_name  # matches run_dir suffix
      save_dir: *run_dir
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 4
        save_last: true
        dirpath: *run_dir
  fast_dev_run: false
  max_epochs: 100
  log_every_n_steps: 10
  enable_checkpointing: true
  inference_mode: true
  use_distributed_sampler: false  # FlexibleBatchSampler handles DDP internally
model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.contrastive.ContrastiveEncoder
      init_args:
        backbone: convnext_tiny
        in_channels: 2
        in_stack_depth: 30
        stem_kernel_size: [5, 4, 4]
        stem_stride: [5, 4, 4]
        embedding_dim: 768
        projection_dim: 32
        drop_path_rate: 0.0
    loss_function:
      class_path: viscy_models.contrastive.loss.NTXentHCL
      init_args:
        temperature: 0.07       # final temperature (after annealing)
        beta: 0.5
        # Temperature schedule: cosine anneal from temperature_start → temperature
        # temperature_schedule: cosine
        # temperature_start: 0.1
        # temperature_warmup_epochs: 50
    lr: 0.00002
    # Optional auxiliary classification heads.
    # head_name: used for logging (loss/aux/{head_name}/{stage})
    # batch_key: key in anchor_meta["labels"] that carries integer class labels
    # Multiple heads can be added — each runs independently and its loss is
    # added to the contrastive loss weighted by loss_weight.
    # auxiliary_heads:
    #   perturbation:
    #     class_path: viscy_models.components.heads.ClassificationHead
    #     init_args:
    #       head_name: perturbation
    #       batch_key: perturbation    # must match a key in anchor_meta["labels"]
    #       in_dims: 768               # must match encoder embedding_dim
    #       hidden_dims: 256
    #       num_classes: 4
    #       cosine_classifier: true    # L2-normalised head (recommended for large n_classes)
    #       loss_weight: 0.5
    #       top_k: 5                   # logs top-1 and top-5 accuracy
    log_batches_per_epoch: 3
    log_samples_per_batch: 3
    # PCA pairplot logged to WandB every N val epochs (null = disabled, WandB logger only)
    # Colors points by this SampleMeta key (perturbation/experiment/hours_post_perturbation)
    log_embeddings_every_n_epochs: 10
    pca_color_key: perturbation
    example_input_array_shape: [1, 2, 30, 256, 256]
data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    # ── Data source ───────────────────────────────────────────────────────────
    collection_path: #TODO path to collection.yml
    channels_per_sample: 1    # bag-of-channels: one random channel per sample, key="channel_0"
    cell_index_path: null  # Optional: path to pre-built cell_index.parquet (faster startup)
    # ── Patch extraction ──────────────────────────────────────────────────────
    z_window: 30
    yx_patch_size: [384, 384]
    final_yx_patch_size: [160, 160]
    # ── Train / val split ─────────────────────────────────────────────────────
    val_experiments:
      - #TODO experiment name(s) for validation
    # ── Positive pair sampling ────────────────────────────────────────────────
    tau_range: [0.5, 2.0]
    tau_decay_rate: 2.0
    # ── Batch sampling ────────────────────────────────────────────────────────
    batch_size: 64
    num_workers: 12
    batch_group_by: experiment
    stratify_by: perturbation
    leaky: 0.0
    temporal_enrichment: true
    temporal_window_hours: 2.0
    temporal_global_fraction: 0.3
    seed: 0
    # ── Augmentation pipeline ─────────────────────────────────────────────────
    channel_dropout_channels: [1]  # Drop fluorescence channel
    channel_dropout_prob: 0.5
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [channel_0]
          level: fov_statistics
          subtrahend: mean
          divisor: std
      - class_path: viscy_transforms.ScaleIntensityRangePercentilesd
        init_args:
          keys: [channel_0]
          lower: 50
          upper: 99
          b_min: 0.0
          b_max: 1.0
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel_0]
          prob: 0.8
          scale_range: [[0.8, 1.2], [0.8, 1.2], [0.8, 1.2]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel_0]
          prob: 0.5
          gamma: [0.8, 1.2]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel_0]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel_0]
          prob: 0.5
          sigma_x: [0.25, 0.75]
          sigma_y: [0.25, 0.75]
          sigma_z: [0.0, 0.0]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel_0]
          prob: 0.5
          mean: 0.0
          std: 0.2
    # Loss reference (informational -- actual loss is on model.loss_function)
    cache_pool_bytes: 0
