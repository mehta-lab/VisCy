# DINOv3 frozen backbone + trainable MLP head — temporal contrastive training
# =============================================================================
# Benchmark config: frozen DINOv3 features + MLP trained with NTXent.
# Gradient flow: frozen DINOv3 → features → trainable MLP → projections → NTXent
#
# Purpose: measure how much temporal structure is in DINOv3 features and how
# much a shallow adapter can recover, vs. the full DynaCLR model.
#
# Key differences from multi_experiment_fit.yml:
# 1. encoder is DINOv3Model (frozen) with MLP (trainable)
# 2. loss_function is NTXentLoss (not NTXentHCL — no cross-experiment hard negatives)
# 3. z_window: 1 — delivers a single focal slice (DINOv3 is 2D)
# 4. Single GPU is sufficient (no backbone gradients, much less memory)
# 5. strategy: auto (single GPU, no DDP needed)
#
# Set before launching:
#   RUN_DIR:  root output directory for this run
#   RUN_NAME: short label for WandB and directory names
#
# Override at launch:
#   dynaclr fit --config dinov3_finetune_fit.yml \
#     --trainer.logger.init_args.name=my_run_v1 \
#     --trainer.logger.init_args.save_dir=/hpc/projects/.../runs/my_run_v1 \
#     --trainer.callbacks[1].init_args.dirpath=/hpc/projects/.../runs/my_run_v1/checkpoints

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 32-true
  default_root_dir: /hpc/projects/intracellular_dashboard/organelle_dynamics/models/DINOv3-temporal-MLP-2D-BagOfChannels/v1
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      entity: computational_imaging
      project: dynaclr
      name: DINOv3-temporal-MLP-2D-BagOfChannels-v1
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/train
        every_n_epochs: 1
        save_top_k: 4
        save_last: true
  fast_dev_run: false
  max_epochs: 100
  log_every_n_steps: 10
  enable_checkpointing: true
  inference_mode: true
  use_distributed_sampler: true
model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.foundation.dinov3.DINOv3Model
      init_args:
        model_name: facebook/dinov3-convnext-tiny-pretrain-lvd1689m  # 768-dim pooler output
        freeze: true
        projection:
          class_path: viscy_models.components.heads.MLP
          init_args:
            in_dims: 768   # DINOv3-convnext-tiny hidden dim
            hidden_dims: 768
            out_dims: 128
            norm: ln
            activation: relu
    loss_function:
      class_path: pytorch_metric_learning.losses.NTXentLoss
      init_args:
        temperature: 0.5
    lr: 0.0001  # higher LR — only MLP trains, backbone frozen
    log_batches_per_epoch: 3
    log_samples_per_batch: 3
    log_embeddings_every_n_epochs: 10
    pca_color_key: condition
    example_input_array_shape: [1, 1, 1, 160, 160]
data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    cell_index_path: /hpc/projects/intracellular_dashboard/organelle_dynamics/models/DINOv3-temporal-MLP-2D-BagOfChannels/DynaCLR-2D-BagOfChannels-v3.parquet
    collection_path: /home/eduardo.hirata/repos/viscy/applications/dynaclr/configs/collections/DynaCLR-2D-BagOfChannels-v3.yml
    z_window: 1  # single focal slice — DINOv3 is 2D
    yx_patch_size: [384, 384]
    final_yx_patch_size: [160, 160]
    val_experiments: []
    tau_range: [0.5, 2.0]
    tau_decay_rate: 0.0
    bag_of_channels: true  # one channel per sample, key is "channel"
    batch_size: 256  # larger batch OK — no backbone gradients
    num_workers: 12
    # Sampling axes
    experiment_aware: false
    stratify_by: condition
    leaky: 0.0
    temporal_enrichment: false
    # temporal_window_hours: 2.0
    # temporal_global_fraction: 0.3
    # Augmentation — bag-of-channels uses "channel" key
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [channel]
          level: fov_statistics
          subtrahend: median
          divisor: iqr
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel]
          prob: 0.8
          scale_range: [[0.8, 1.2], [0.8, 1.2], [0.8, 1.2]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel]
          prob: 0.5
          gamma: [0.8, 1.2]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel]
          prob: 0.5
          sigma_x: [0.25, 0.75]
          sigma_y: [0.25, 0.75]
          sigma_z: [0.0, 0.0]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel]
          prob: 0.5
          mean: 0.0
          std: 0.2
    hcl_beta: 0.5
    cache_pool_bytes: 0
    seed: 0
