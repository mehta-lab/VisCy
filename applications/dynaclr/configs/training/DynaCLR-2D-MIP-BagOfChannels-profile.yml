# DynaCLR-2D-MIP-BagOfChannels — profiling override
# ====================================================
# Layer on top of DynaCLR-2D-MIP-BagOfChannels.yml to profile training.
# Limits to a few batches and enables the PyTorch profiler.
#
# Launch locally:
#   uv run viscy fit \
#     --config applications/dynaclr/configs/training/DynaCLR-2D-MIP-BagOfChannels.yml \
#     --config applications/dynaclr/configs/training/DynaCLR-2D-MIP-BagOfChannels-profile.yml

trainer:
  strategy: auto
  devices: 1
  max_epochs: 1
  limit_train_batches: 20
  limit_val_batches: 5
  enable_checkpointing: false
  logger: false
  callbacks: []
  default_root_dir: /hpc/projects/organelle_phenotyping/models/profiling/DynaCLR-2D-MIP-BoC-v6-pf2-buffer8
  profiler:
    class_path: lightning.pytorch.profilers.PyTorchProfiler
    init_args:
      dirpath: /hpc/projects/organelle_phenotyping/models/profiling/DynaCLR-2D-MIP-BoC-v6-pf2-buffer8
      filename: profile
      export_to_chrome: true
      record_module_names: true
      sort_by_key: cuda_time_total
      row_limit: 30

data:
  init_args:
    pin_memory: true
    buffer_size: 8
