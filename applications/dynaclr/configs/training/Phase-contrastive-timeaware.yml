# Phase contrastive timeaware — DINOv3 frozen backbone + temporal MLP
# =====================================================================
# Frozen DINOv3-convnext-tiny (768-dim) with trainable MLP projection (768->768->128).
# Single GPU — no backbone gradients means low memory footprint.
# Reproduces legacy Phase contrastive timeaware ablations.
#
# Launch:
#   sbatch applications/dynaclr/configs/training/Phase-contrastive-timeaware.sh

seed_everything: 42

trainer:
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 32-true
  max_epochs: 150
  log_every_n_steps: 10
  enable_checkpointing: true
  enable_model_summary: false
  inference_mode: true
  use_distributed_sampler: false
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 5
        save_last: true
    - class_path: viscy_utils.callbacks.OnlineEvalCallback
      init_args:
        every_n_epochs: 5
        label_key: perturbation
        k: 20
    - class_path: viscy_utils.callbacks.SaveConfigToWandb

model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.foundation.DINOv3Model
      init_args:
        model_name: facebook/dinov3-convnext-tiny-pretrain-lvd1689m
        freeze: true
        projection:
          class_path: viscy_models.components.heads.MLP
          init_args:
            in_dims: 768
            hidden_dims: 768
            out_dims: 128
            norm: ln
            activation: relu
    loss_function:
      class_path: viscy_models.contrastive.loss.NTXentLoss
      init_args:
        temperature: 0.5
    lr: 0.0001
    log_batches_per_epoch: 3
    log_samples_per_batch: 3
    log_embeddings_every_n_epochs: 10
    pca_color_keys: "[perturbation,hours_post_perturbation]"
    example_input_array_shape: [1, 1, 30, 192, 192]

data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    collection_path: applications/dynaclr/configs/collections/Phase-contrastive-timeaware.yml
    cell_index_path: applications/dynaclr/configs/cell_index/Phase-contrastive-timeaware.parquet
    z_window: 30
    z_extraction_window: 40
    yx_patch_size: [384, 384]
    final_yx_patch_size: [192, 192]
    positive_cell_source: lookup
    positive_match_columns: [lineage_id]
    tau_range: [0.5, 0.5]
    tau_decay_rate: 0.0
    stratify_by: [perturbation]
    split_ratio: 0.8
    batch_size: 128
    num_workers: 1
    seed: 42
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [Phase3D]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [Phase3D]
          prob: 0.8
          scale_range: [[0.8, 2.0], [0.8, 2.0], [0.8, 2.0]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.1, 0.1, 0.0, 0.1, 0.0, 0.1]
          mode: bilinear
      - class_path: viscy_transforms.BatchedRandSpatialCropd
        init_args:
          keys: [Phase3D]
          roi_size: [36, 320, 320]
      - class_path: viscy_transforms.BatchedCenterSpatialCropd
        init_args:
          keys: [Phase3D]
          roi_size: [30, 192, 192]
      - class_path: viscy_transforms.BatchedRandFlipd
        init_args:
          keys: [Phase3D]
          prob: 0.5
          spatial_axes: [1, 2]
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [Phase3D]
          prob: 0.5
          gamma: [0.6, 1.6]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [Phase3D]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [Phase3D]
          prob: 0.5
          mean: 0.0
          std: 0.3
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [Phase3D]
          prob: 0.5
          sigma_x: [0.25, 1.5]
          sigma_y: [0.25, 1.5]
          sigma_z: [0.25, 1.5]
