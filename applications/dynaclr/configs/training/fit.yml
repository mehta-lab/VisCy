# See help here on how to configure hyper-parameters with config files:
# https://lightning.ai/docs/pytorch/stable/cli/lightning_cli_advanced.html
#
# Run-specific paths — set these before launching:
#   RUN_DIR:  root output directory for this run, e.g. /hpc/projects/.../runs/my_run_v1
#             checkpoints, snapshots, and WandB local cache all live here.
#   RUN_NAME: short label that appears in WandB and directory names.
#
# Override at launch:
#   dynaclr fit --config fit.yml \
#     --trainer.logger.init_args.name=my_run_v1 \
#     --trainer.logger.init_args.save_dir=/hpc/projects/.../runs/my_run_v1 \
#     --trainer.callbacks[1].init_args.dirpath=/hpc/projects/.../runs/my_run_v1/checkpoints \
#     --trainer.callbacks[2].init_args.output_dir=/hpc/projects/.../runs/my_run_v1/snapshots
#
# TODO: point to the path to the data
# TODO: point to the path to the tracks

_run_dir: &run_dir /hpc/projects/TODO/runs/TODO_run_name  # set this

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: ddp
  devices: 4
  num_nodes: 1
  precision: 32-true
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      entity: computational_imaging
      project: dynaclr
      name: TODO_run_name  # matches run_dir suffix
      save_dir: *run_dir
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 4
        save_last: true
        dirpath: *run_dir
    - class_path: viscy_utils.callbacks.EmbeddingSnapshotCallback
      init_args:
        output_dir: *run_dir
        every_n_epochs: 10
        store_images: true
        pca_kwargs:
          n_components: 8
  fast_dev_run: false
  max_epochs: 100
  log_every_n_steps: 10
  enable_checkpointing: true
  inference_mode: true
  use_distributed_sampler: true
model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.contrastive.ContrastiveEncoder
      init_args:
        backbone: convnext_tiny
        in_channels: 2
        in_stack_depth: 30
        stem_kernel_size: [5, 4, 4]
        stem_stride: [5, 4, 4]
        embedding_dim: 768
        projection_dim: 32
        drop_path_rate: 0.0
    loss_function:
      class_path: torch.nn.TripletMarginLoss
      init_args:
        margin: 0.5
    lr: 0.00002
    log_batches_per_epoch: 3
    log_samples_per_batch: 3
    # PCA pairplot logged to WandB every N val epochs (null = disabled, WandB logger only)
    # Colors points by this SampleMeta key (condition/experiment/hours_post_perturbation)
    log_embeddings_every_n_epochs: 10
    pca_color_key: condition
    example_input_array_shape: [1, 2, 30, 256, 256]
data:
  class_path: viscy_data.triplet.TripletDataModule
  init_args:
    data_path: #TODO point to the path to the data (e.g. /2024_10_16_A549_SEC61_sensor_train.zarr)
    tracks_path: #TODO point to the path to the corresponding tracks (e.g. /track_trainVal.zarr)
    source_channel:
      - Phase3D
      - raw mCherry EX561 EM600-37
    z_range: [15, 45]
    batch_size: 64
    num_workers: 12
    initial_yx_patch_size: [384, 384]
    final_yx_patch_size: [160, 160]
    time_interval: 1
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [Phase3D]
          level: fov_statistics
          subtrahend: mean
          divisor: std
      - class_path: viscy_transforms.ScaleIntensityRangePercentilesd
        init_args:
          keys: [raw mCherry EX561 EM600-37]
          lower: 50
          upper: 99
          b_min: 0.0
          b_max: 1.0
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [Phase3D, raw mCherry EX561 EM600-37]
          prob: 0.8
          scale_range: [[0.8, 1.2], [0.8, 1.2], [0.8, 1.2]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [raw mCherry EX561 EM600-37]
          prob: 0.5
          gamma: [0.8, 1.2]
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [Phase3D]
          prob: 0.5
          gamma: [0.8, 1.2]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [raw mCherry EX561 EM600-37]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [Phase3D]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [Phase3D, raw mCherry EX561 EM600-37]
          prob: 0.5
          sigma_x: [0.25, 0.75]
          sigma_y: [0.25, 0.75]
          sigma_z: [0.0, 0.0]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [raw mCherry EX561 EM600-37]
          prob: 0.5
          mean: 0.0
          std: 0.2
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [Phase3D]
          prob: 0.5
          mean: 0.0
          std: 0.2
