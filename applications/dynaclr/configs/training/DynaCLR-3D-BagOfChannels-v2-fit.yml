# DynaCLR-3D-BagOfChannels-v2 Phase 1 training config
# ====================================================
# 3D bag-of-channels contrastive learning on infectomics + dragonfly.
# 22 experiments (8 mantis + 2 dragonfly), all ZIKV/DENV infection.
# Random Z crop for focus-plane invariance, asymmetric extraction (0.3).
# Cross-microscope pixel normalization to 0.1494 um/px.
#
# Positive pairs: temporal (same cell lineage at t+tau).
# Negatives: in-batch, mixed across experiments and microscopes.
# Stratification: perturbation (infected/uninfected in every batch).
#
# Phase 1: Standard NTXent, learn coarse trajectory structure.
# Phase 2 (later): Load checkpoint, switch to NTXentHCL beta=0.5,
#   lower LR to 2e-6, optionally widen tau_range.
#
# Usage:
#   viscy fit --config applications/dynaclr/configs/training/DynaCLR-3D-BagOfChannels-v2-fit.yml
# Fast dev run:
#   viscy fit --config applications/dynaclr/configs/training/DynaCLR-3D-BagOfChannels-v2-fit.yml --trainer.fast_dev_run true

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: ddp
  devices: 2
  num_nodes: 1
  precision: bf16-mixed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      entity: computational_imaging
      project: DynaCLR-3D-BagOfChannels-v2
      name: phase1-ntxent-temp0p2
      save_dir: /hpc/projects/organelle_phenotyping/models/DynaCLR-3D-BagOfChannels-v2
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 5
        save_last: true
        dirpath: /hpc/projects/organelle_phenotyping/models/DynaCLR-3D-BagOfChannels-v2/checkpoints
    - class_path: viscy_utils.callbacks.OnlineEvalCallback
      init_args:
        every_n_epochs: 5
        label_key: perturbation
        k: 20
  fast_dev_run: false
  max_epochs: 150
  log_every_n_steps: 10
  enable_checkpointing: true
  enable_model_summary: false
  inference_mode: true
  use_distributed_sampler: false
model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.contrastive.ContrastiveEncoder
      init_args:
        backbone: convnext_tiny
        in_channels: 1
        in_stack_depth: 16
        stem_kernel_size: [4, 4, 4]
        stem_stride: [4, 4, 4]
        embedding_dim: 768
        projection_dim: 32
        drop_path_rate: 0.1
    loss_function:
      class_path: viscy_models.contrastive.loss.NTXentLoss
      init_args:
        temperature: 0.2
    lr: 0.00002
    log_batches_per_epoch: 3
    log_samples_per_batch: 3
    log_embeddings_every_n_epochs: 10
    pca_color_keys: [perturbation, hours_post_perturbation, experiment, marker]
    example_input_array_shape: [1, 1, 16, 160, 160]
data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    # ── Data source ──────────────────────────────────────────────────────────
    collection_path: applications/dynaclr/configs/collections/DynaCLR-3D-BagOfChannels-v2.yml
    cell_index_path: /hpc/projects/organelle_phenotyping/models/collections/DynaCLR-3D-BagOfChannels-v2.parquet
    # ── Patch extraction ─────────────────────────────────────────────────────
    z_window: 16
    z_extraction_window: 45
    z_focus_offset: 0.3
    yx_patch_size: [192, 192]
    final_yx_patch_size: [160, 160]
    channels_per_sample: 1
    # ── Train / val split ────────────────────────────────────────────────────
    split_ratio: 0.8
    val_experiments: []
    # ── Positive pair sampling ───────────────────────────────────────────────
    positive_cell_source: lookup
    positive_match_columns: [lineage_id]
    tau_range: [0.5, 2.0]
    tau_decay_rate: 2.0
    # ── Batch sampling ───────────────────────────────────────────────────────
    batch_size: 128
    num_workers: 1
    batch_group_by: null
    stratify_by: [perturbation]
    leaky: 0.0
    temporal_enrichment: false
    seed: 42
    label_columns:
      perturbation: perturbation
    # ── Pixel size normalization ─────────────────────────────────────────────
    reference_pixel_size_xy_um: 0.1494
    reference_pixel_size_z_um: 0.174
    focus_channel: Phase3D
    # ── Augmentation pipeline ────────────────────────────────────────────────
    channel_dropout_channels: []
    channel_dropout_prob: 0.0
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [channel_0]
          level: timepoint_statistics
          subtrahend: mean
          divisor: std
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel_0]
          prob: 0.8
          scale_range: [[0.9, 1.1], [0.9, 1.1], [0.9, 1.1]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandFlipd
        init_args:
          keys: [channel_0]
          spatial_axes: [1, 2]
          prob: 0.5
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel_0]
          prob: 0.5
          gamma: [0.6, 1.6]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel_0]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel_0]
          prob: 0.5
          sigma_x: [0.25, 0.50]
          sigma_y: [0.25, 0.50]
          sigma_z: [0.0, 0.2]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel_0]
          prob: 0.5
          mean: 0.0
          std: 0.1
    cache_pool_bytes: 0
