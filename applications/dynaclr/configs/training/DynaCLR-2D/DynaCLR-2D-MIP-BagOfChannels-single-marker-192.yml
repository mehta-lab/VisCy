# Override: single-marker batches at 384->256->192 patch sizes (vs the
# default single-marker at 256->192->160). Larger final crop preserves more
# subcellular detail; affine corner safety holds at scale_range=[0.8, 1.3]
# under any rotation because 384 / sqrt(2) * 0.8 = 217 > 192.
#
# Layered on top of the base single-marker override:
#   --config applications/dynaclr/configs/training/DynaCLR-2D/DynaCLR-2D-MIP-BagOfChannels.yml
#   --config applications/dynaclr/configs/training/DynaCLR-2D/DynaCLR-2D-MIP-BagOfChannels-single-marker.yml
#   --config applications/dynaclr/configs/training/DynaCLR-2D/DynaCLR-2D-MIP-BagOfChannels-single-marker-192.yml

model:
  init_args:
    example_input_array_shape: [1, 1, 1, 192, 192]

data:
  init_args:
    yx_patch_size: [384, 384]
    final_yx_patch_size: [192, 192]
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel_0]
          prob: 0.8
          scale_range: [[0.8, 1.3], [0.8, 1.3], [0.8, 1.3]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandFlipd
        init_args:
          keys: [channel_0]
          spatial_axes: [1, 2]
          prob: 0.5
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel_0]
          prob: 0.5
          gamma: [0.6, 1.6]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel_0]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel_0]
          prob: 0.5
          sigma_x: [0.25, 0.50]
          sigma_y: [0.25, 0.50]
          sigma_z: [0.0, 0.0]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel_0]
          prob: 0.5
          mean: 0.0
          std: 0.1
      # Random Z + YX crop: 384 -> 256 keeps a 32px margin (≈ 0.85x) for the
      # final 192 center crop after the affine corner artifacts have been
      # avoided. Z roi unchanged from base.
      - class_path: viscy_transforms.BatchedRandSpatialCropd
        init_args:
          keys: [channel_0]
          roi_size: [10, 256, 256]
      # Z-reduction stays last (before implicit final spatial crop to 192).
      - class_path: viscy_transforms.BatchedChannelWiseZReductiond
        init_args:
          keys: [channel_0]
          allow_missing_keys: true
