# DynaCLR-2D-MIP-BagOfChannels
# ==============================
# 2D bag-of-channels contrastive learning with channel-wise z-reduction.
# Extracts a 20-slice z-stack around focus, randomly crops to 10 slices
# (Z-invariance), then applies MIP for fluorescence and center-slice for
# label-free (Phase3D, BF, DIC, Retardance).
# Multi-cell-type: A549 infectomics, microglia dynamorph, ALFI mitosis.
#
# Launch:
#   sbatch applications/dynaclr/configs/training/DynaCLR-2D/DynaCLR-2D-MIP-BagOfChannels.sh
#
# Resume:
#   CKPT_PATH=.../last.ckpt sbatch .../DynaCLR-2D-MIP-BagOfChannels.sh

base:
  - ../recipes/trainer.yml
  - ../recipes/model/contrastive_encoder_convnext_tiny.yml

trainer:
  strategy: ddp
  devices: 4
  precision: bf16-mixed
  max_epochs: 150
  # 2.7M train anchors × bs=256 = ~10.5k full-epoch batches → 85 min/epoch
  # at current ~132 samples/s. Cap epoch length so wall time stays bounded
  # and the val signal lands often. Matches the pattern used by OPS-1000genes.
  limit_train_batches: 800
  limit_val_batches: 200
  logger:
    init_args:
      project: DynaCLR-2D-MIP-BagOfChannels
      name: null
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 5
        save_last: true
    - class_path: viscy_utils.callbacks.OnlineEvalCallback
      init_args:
        every_n_epochs: 5
        label_key: perturbation
        k: 20
        track_id_key: global_track_id
        timepoint_key: t

model:
  init_args:
    encoder:
      init_args:
        in_stack_depth: 1
        stem_kernel_size: [1, 4, 4]
        stem_stride: [1, 4, 4]
        projection_dim: 32
        drop_path_rate: 0.1
    loss_function:
      init_args:
        temperature: 0.2
    lr: 0.00002
    pca_color_keys: "[perturbation,hours_post_perturbation,experiment,marker]"
    log_negative_metrics_every_n_epochs: 2
    example_input_array_shape: [1, 1, 1, 160, 160]

data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    cell_index_path: /hpc/projects/organelle_phenotyping/models/collections/DynaCLR-2D-MIP-BagOfChannels-v3.parquet
    focus_channel: Phase3D
    reference_pixel_size_xy_um: 0.1494
    z_window: 1
    z_extraction_window: 16
    z_focus_offset: 0.3
    yx_patch_size: [256, 256]
    final_yx_patch_size: [160, 160]
    channels_per_sample: 1
    positive_cell_source: lookup
    positive_match_columns: [lineage_id]
    positive_channel_source: same
    tau_range: [0.5, 2.0]
    tau_decay_rate: 2.0
    stratify_by: [perturbation, marker]
    split_ratio: 0.8
    batch_size: 256
    num_workers: 4
    # Per-rank memory budget on h100/h200 nodes (8 GB/CPU × 15 CPUs = 120 GB).
    # 26 plates × 500 MB per-plate cache pools = ~13 GB of dead weight (iohub
    # 0.3.x creates one ts.Context per open_ome_zarr; random sampling across
    # plates → near-zero hit rate). Disable. Cap ThreadBuffer queue to one
    # batch and let prefetch_factor=2 do modest pipelining without runaway
    # in-flight memory.
    prefetch_factor: 2
    buffer_size: 1
    cache_pool_bytes: 0
    # Match historical iohub default; the 128 we tried for +8.6% A/B amplifies
    # tensorstore decoder/IO buffers and contributes to OOM under DDP.
    file_io_concurrency: 32
    seed: 42
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [channel_0]
          level: timepoint_statistics
          subtrahend: mean
          divisor: std
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel_0]
          prob: 0.8
          scale_range: [[0.8, 1.3], [0.8, 1.3], [0.8, 1.3]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandFlipd
        init_args:
          keys: [channel_0]
          spatial_axes: [1, 2]
          prob: 0.5
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel_0]
          prob: 0.5
          gamma: [0.6, 1.6]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel_0]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel_0]
          prob: 0.5
          sigma_x: [0.25, 0.50]
          sigma_y: [0.25, 0.50]
          sigma_z: [0.0, 0.0]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel_0]
          prob: 0.5
          mean: 0.0
          std: 0.1
      # Random Z crop: select 10 of 20 extracted slices for Z-invariance.
      # Must come before ZReduction so MIP sees a variable sub-stack.
      - class_path: viscy_transforms.BatchedRandSpatialCropd
        init_args:
          keys: [channel_0]
          roi_size: [10, 192, 192]
      # Z-reduction: MIP for fluorescence, center-slice for label-free.
      # Must be LAST augmentation (before implicit final spatial crop).
      - class_path: viscy_transforms.BatchedChannelWiseZReductiond
        init_args:
          keys: [channel_0]
          allow_missing_keys: true
