# Override: SimCLR-style "classical" DynaCLR-2D-MIP-BoC.
# Anchor and positive are the same crop; augmentation creates two views.
# Same v3 parquet, same channel/marker mix, same single-marker batching as
# the temporal-positive variant — only the positive-sampling strategy differs.

data:
  init_args:
    cell_index_path: /hpc/projects/organelle_phenotyping/models/collections/DynaCLR-2D-MIP-BagOfChannels-v3.parquet
    # Self-augmented positives (SimCLR-style). Fully self-supervised:
    # no lineage/track lookup, no tau scheduling. Augmentation pipeline
    # provides view diversity. Single-marker batches still supply
    # same-marker different-cell negatives, preserving discrimination
    # signal at the marker/perturbation level.
    positive_cell_source: self
    positive_match_columns: null
    positive_channel_source: same
    # Single-marker batches (OPS strategy) — every batch is one marker,
    # forcing the model to learn cellular features instead of channel
    # shortcuts.
    batch_group_by: marker
    # Within a marker's draw, balance across the experiments containing
    # that marker. Without this, Phase3D batches were 74% dynamorph cells
    # because dynamorph is by far the largest Phase3D experiment.
    stratify_by: experiment
    # Marker-uniform weights. Without these, batch_group_by + stratify_by
    # weights marker draws by the (marker, experiment) cross-product cell
    # counts. Setting equal weights per marker forces uniform
    # P(marker)=1/n_markers per batch.
    group_weights:
      Phase3D: 1.0
      pAL10: 1.0
      viral_sensor: 1.0
      G3BP1: 1.0
      SEC61B: 1.0
      TOMM20: 1.0
      CAAX: 1.0
      HIST2H2BE: 1.0
      DIC: 1.0
