# DINOv3-temporal-MLP-2D-BagOfChannels
# =========================================
# Frozen DINOv3 backbone + trainable MLP projection head.
# 2D bag-of-channels with MIP z-reduction (same data pipeline as
# DynaCLR-2D-MIP-BagOfChannels).
#
# Launch:
#   sbatch applications/dynaclr/configs/training/DINOv3-temporal-MLP-2D-BagOfChannels.sh
#
# Resume:
#   CKPT_PATH=.../last.ckpt sbatch .../DINOv3-temporal-MLP-2D-BagOfChannels.sh

seed_everything: 42

trainer:
  accelerator: gpu
  strategy: ddp
  devices: 2
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 100
  log_every_n_steps: 10
  enable_checkpointing: true
  enable_model_summary: false
  inference_mode: true
  use_distributed_sampler: false
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      entity: computational_imaging
      project: DINOv3-temporal-MLP-2D-BagOfChannels-v1
      name: null
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 5
        save_last: true
    - class_path: viscy_utils.callbacks.OnlineEvalCallback
      init_args:
        every_n_epochs: 5
        label_key: perturbation
        k: 20
        track_id_key: global_track_id
        timepoint_key: t
    - class_path: viscy_utils.callbacks.SaveConfigToWandb

model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.foundation.dinov3.DINOv3Model
      init_args:
        model_name: facebook/dinov3-convnext-tiny-pretrain-lvd1689m
        freeze: true
        projection:
          class_path: viscy_models.components.heads.MLP
          init_args:
            in_dims: 768
            hidden_dims: 768
            out_dims: 128
            norm: ln
            activation: relu
    loss_function:
      class_path: viscy_models.contrastive.loss.NTXentLoss
      init_args:
        temperature: 0.5
    lr: 0.0001
    log_batches_per_epoch: 3
    log_samples_per_batch: 3
    log_embeddings_every_n_epochs: 10
    pca_color_keys: [perturbation, hours_post_perturbation, experiment, marker]
    log_negative_metrics_every_n_epochs: 2
    example_input_array_shape: [1, 1, 1, 160, 160]

data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    cell_index_path: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/DynaCLR-2D-MIP-BagOfChannels.parquet
    focus_channel: Phase3D
    reference_pixel_size_xy_um: 0.1494
    z_window: 1
    z_extraction_window: 11
    z_focus_offset: 0.5
    yx_patch_size: [256, 256]
    final_yx_patch_size: [160, 160]
    channels_per_sample: 1
    positive_cell_source: lookup
    positive_match_columns: [lineage_id]
    positive_channel_source: same
    tau_range: [0.5, 2.0]
    tau_decay_rate: 2.0
    stratify_by: [perturbation, marker]
    split_ratio: 0.8
    batch_size: 512
    num_workers: 2
    seed: 42
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [channel_0]
          level: timepoint_statistics
          subtrahend: mean
          divisor: std
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel_0]
          prob: 0.8
          scale_range: [[0.9, 1.1], [0.9, 1.1], [0.9, 1.1]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandFlipd
        init_args:
          keys: [channel_0]
          spatial_axes: [1, 2]
          prob: 0.5
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel_0]
          prob: 0.5
          gamma: [0.8, 1.3]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel_0]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel_0]
          prob: 0.5
          sigma_x: [0.25, 0.50]
          sigma_y: [0.25, 0.50]
          sigma_z: [0.0, 0.0]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel_0]
          prob: 0.5
          mean: 0.0
          std: 0.08
      # Z-reduction: MIP for fluorescence, center-slice for label-free.
      # Must be LAST augmentation (before implicit final spatial crop).
      - class_path: viscy_transforms.BatchedChannelWiseZReductiond
        init_args:
          keys: [channel_0]
          allow_missing_keys: true
