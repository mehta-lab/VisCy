# DynaCLR-2D-BagOfChannels-v3 training config
# =============================================
# Bag-of-channels contrastive learning on infectomics time-lapse data.
# 6 experiments: TOMM20 (mitochondria), SEC61B (ER), G3BP1 (stress granules),
# multi-organelle — all with ZIKV/DENV infection.
#
# Positive pairs: temporal (same cell lineage at t+tau) — time-lapse data.
# Stratification: condition (infected/uninfected) × organelle.
# Each sample: 1 randomly selected channel (Phase3D, GFP, or mCherry).
#
# Usage:
#   viscy fit --config applications/dynaclr/configs/training/DynaCLR-2D-BagOfChannels-v3-fit.yml
#
# Fast dev run:
#   viscy fit --config applications/dynaclr/configs/training/DynaCLR-2D-BagOfChannels-v3-fit.yml --trainer.fast_dev_run true

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: ddp
  devices: 2
  num_nodes: 1
  precision: bf16-mixed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      entity: computational_imaging
      project: DynaCLR-2D-BagOfChannels-v3
      name: test-run-temp0p2-batch256-2gpuddp-
      save_dir: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-BagOfChannels-v3
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 5
        save_last: true
        dirpath: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-BagOfChannels-v3/checkpoints
  fast_dev_run: false
  max_epochs: 150
  log_every_n_steps: 10
  enable_checkpointing: true
  enable_model_summary: false
  inference_mode: true
  use_distributed_sampler: false
model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.contrastive.ContrastiveEncoder
      init_args:
        backbone: convnext_tiny
        in_channels: 1
        in_stack_depth: 1
        stem_kernel_size: [1, 4, 4]
        stem_stride: [1, 4, 4]
        embedding_dim: 768
        projection_dim: 32
        drop_path_rate: 0.1
    loss_function:
      class_path: viscy_models.contrastive.loss.NTXentLoss
      init_args:
        temperature: 0.2
    lr: 0.00002
    log_batches_per_epoch: 3
    log_samples_per_batch: 3
    log_embeddings_every_n_epochs: 10
    pca_color_keys: [condition, hours_post_perturbation]
    example_input_array_shape: [1, 1, 1, 160, 160]
data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    # ── Data source ───────────────────────────────────────────────────────────
    collection_path: null
    cell_index_path: /hpc/mydata/eduardo.hirata/repos/viscy/applications/dynaclr/configs/cell_index/DynaCLR-2D-BagOfChannels-v3.parquet
    # ── Patch extraction ──────────────────────────────────────────────────────
    z_window: 1
    yx_patch_size: [192, 192]
    final_yx_patch_size: [160, 160]
    channels_per_sample: 1
    # ── Train / val split ─────────────────────────────────────────────────────
    split_ratio: 0.8              # FOV-level 80/20 split within each experiment
    val_experiments: []
    # ── Positive pair sampling ────────────────────────────────────────────────
    positive_cell_source: lookup
    positive_match_columns: [lineage_id]  # temporal: same cell at t+tau
    tau_range: [0.5, 2.0]         # hours; 1–4 frames at 30-min intervals
    tau_decay_rate: 2.0           # exponential decay — prefers short taus
    # ── Batch sampling ────────────────────────────────────────────────────────
    batch_size: 256
    num_workers: 1
    experiment_aware: false
    stratify_by: [condition, marker]
    leaky: 0.0
    temporal_enrichment: false
    seed: 42
    # ── Augmentation pipeline ─────────────────────────────────────────────────
    channel_dropout_channels: []
    channel_dropout_prob: 0.0
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [channel_0]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel_0]
          prob: 0.8
          scale_range: [[0.8, 1.3], [0.8, 1.3], [0.8, 1.3]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandFlipd
        init_args:
          keys: [channel_0]
          spatial_axes: [1, 2]
          prob: 0.5
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel_0]
          prob: 0.5
          gamma: [0.6, 1.6]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel_0]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel_0]
          prob: 0.5
          sigma_x: [0.25, 0.50]
          sigma_y: [0.25, 0.50]
          sigma_z: [0.0, 0.0]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel_0]
          prob: 0.5
          mean: 0.0
          std: 0.1
    cache_pool_bytes: 0
