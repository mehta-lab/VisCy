# OPS 373-gene DynaCLR with gene classifier head
# =================================================
# Fine-tune from pre-trained OPS checkpoint with cosine classifier.
# Gene+reporter positive pairs, stratified by marker (reporter).
#
# Launch:
#   sbatch applications/dynaclr/configs/training/OPS-373genes.sh

base:
  - recipes/trainer.yml
  - recipes/model/contrastive_encoder_convnext_tiny.yml
  - recipes/data/ops_gene_reporter.yml
  - recipes/augmentations/ops_2d_mild.yml

trainer:
  strategy: ddp
  devices: 4
  precision: bf16-mixed
  max_epochs: 300
  limit_train_batches: 400
  limit_val_batches: 100
  log_every_n_steps: 5

model:
  init_args:
    encoder:
      init_args:
        in_stack_depth: 1
        stem_kernel_size: [1, 4, 4]
        stem_stride: [1, 4, 4]
        projection_dim: 256
        drop_path_rate: 0.0
    loss_function:
      init_args:
        temperature: 0.5
    ckpt_path: /hpc/projects/intracellular_dashboard/ops/models/logs/dynaclr/ops_bagofchannels_gene_n_reporter_grouped_reporter_256proj_373genes_convnext_tiny_temp0p5_512bs_lr1e-4_pretrained_self/version_0/checkpoints/last.ckpt
    lr: 0.0001
    log_batches_per_epoch: 8
    log_samples_per_batch: 1
    example_input_array_shape: [1, 1, 1, 128, 128]

data:
  init_args:
    cell_index_path: /hpc/projects/organelle_phenotyping/models/collections/OPS-373genes.parquet
    normalizations:
      - class_path: viscy_transforms.BatchedScaleIntensityRangePercentilesd
        init_args:
          keys: [channel_0]
          lower: 50
          upper: 99
          b_min: 0.0
          b_max: 1.0
          clip: true
