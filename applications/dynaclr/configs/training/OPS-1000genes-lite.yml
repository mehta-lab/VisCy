# OPS 1000-gene DynaCLR with cosine gene classifier head (lite dataset)
# ======================================================================
# Lite dataset: 11M cells, 1001 perturbations, 22 reporters, 74 experiments.
# Percentile normalization (1-99), bag-of-channels, gene+reporter positive pairs.
#
# Launch:
#   sbatch applications/dynaclr/configs/training/OPS-1000genes-lite.sh

base:
  - recipes/trainer.yml
  - recipes/model/contrastive_encoder_convnext_tiny.yml
  - recipes/data/ops_gene_reporter.yml
  - recipes/augmentations/ops_2d_mild.yml

trainer:
  strategy: ddp
  devices: 4
  precision: bf16-mixed
  max_epochs: 300
  limit_train_batches: 400
  limit_val_batches: 100
  log_every_n_steps: 5
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 5
        save_last: true
    - class_path: viscy_utils.callbacks.OnlineEvalCallback
      init_args:
        every_n_epochs: 5
        label_key: perturbation
        k: 20

model:
  init_args:
    encoder:
      init_args:
        in_stack_depth: 1
        stem_kernel_size: [1, 4, 4]
        stem_stride: [1, 4, 4]
        projection_dim: 256
        drop_path_rate: 0.0
    loss_function:
      init_args:
        temperature: 0.5
    auxiliary_heads:
      gene:
        class_path: viscy_models.components.heads.ClassificationHead
        init_args:
          head_name: gene
          batch_key: gene_label
          in_dims: 768
          hidden_dims: 256
          num_classes: 1001
          cosine_classifier: true
          loss_weight: 0.5
          top_k: 5
          weight_schedule: cosine
          weight_start: 0.0
          weight_warmup_epochs: 30
    lr: 0.0002
    log_batches_per_epoch: 8
    log_samples_per_batch: 1
    example_input_array_shape: [1, 1, 1, 128, 128]

data:
  init_args:
    cell_index_path: /hpc/projects/organelle_phenotyping/datasets/ops/training_labels_1000genes_lite_v2_valid.parquet
    normalizations:
      - class_path: viscy_transforms.BatchedScaleIntensityRangePercentilesd
        init_args:
          keys: [channel_0]
          lower: 1
          upper: 99
          b_min: 0.0
          b_max: 1.0
          clip: true
