# Data recipe: OPS gene+reporter contrastive learning defaults.
# Leaf configs override: cell_index_path, normalizations (lower percentile differs).

data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    z_window: 1
    yx_patch_size: [224, 224]
    final_yx_patch_size: [128, 128]
    channels_per_sample: 1
    positive_cell_source: lookup
    positive_match_columns: [perturbation, marker]
    stratify_by: marker
    split_ratio: 0.8
    batch_size: 512
    num_workers: 4
    seed: 0
    shuffle_val: true
    label_columns:
      gene_label: perturbation
