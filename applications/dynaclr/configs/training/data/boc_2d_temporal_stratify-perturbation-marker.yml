# 2D bag-of-channels | temporal positive pairs | stratify by perturbation + marker
# ==================================================================================
# One random channel per sample. Positives: same cell lineage at t+tau.
# Batches balanced by perturbation and marker.
# Normalization: per-FOV mean/std. Augmentations: no Z-axis blur.

data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    # Patch extraction
    z_window: 1
    yx_patch_size: [192, 192]
    final_yx_patch_size: [160, 160]
    # Sampling
    channels_per_sample: 1
    positive_cell_source: lookup
    positive_match_columns: [lineage_id]
    tau_range: [0.5, 2.0]
    tau_decay_rate: 2.0
    stratify_by: [perturbation, marker]
    batch_group_by: null
    leaky: 0.0
    temporal_enrichment: false
    # Train / val split
    split_ratio: 0.8
    val_experiments: []
    # Misc
    num_workers: 1
    channel_dropout_channels: []
    channel_dropout_prob: 0.0
    seed: 42
    cache_pool_bytes: 0
    # shuffle_val: randomize val order each epoch. Use with
    # trainer.limit_val_batches for large datasets (e.g. OPS 14M cells)
    # so each epoch evaluates a different random subset.
    # shuffle_val: true
    # Normalization
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [channel_0]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    # Augmentations (2D: sigma_z = 0)
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel_0]
          prob: 0.8
          scale_range: [[0.8, 1.3], [0.8, 1.3], [0.8, 1.3]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandFlipd
        init_args:
          keys: [channel_0]
          spatial_axes: [1, 2]
          prob: 0.5
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel_0]
          prob: 0.5
          gamma: [0.6, 1.6]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel_0]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel_0]
          prob: 0.5
          sigma_x: [0.25, 0.50]
          sigma_y: [0.25, 0.50]
          sigma_z: [0.0, 0.0]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel_0]
          prob: 0.5
          mean: 0.0
          std: 0.1
