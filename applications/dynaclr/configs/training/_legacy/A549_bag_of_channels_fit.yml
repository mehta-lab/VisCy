# Bag-of-channels contrastive learning
# =====================================
# Reproduces the legacy bag-of-channels model with the new DynaCLR infrastructure.
# 10 experiment entries (8 datasets, 2025_07_24 split by marker), 3 source channels
# (phase, gfp, mcherry). Each sample reads 1 randomly selected channel (in_channels=1).
#
# Model: convnext_tiny, in_channels=1, z_stack_depth=30, patch=192, temp=0.2
# Old run: 8 GPUs, bf16-mixed, batch_size=64, max_epochs=150
#
# Usage:
#   viscy fit -c applications/dynaclr/configs/training/A549_bag_of_channels_fit.yml
#
# Fast dev run:
#   viscy fit -c applications/dynaclr/configs/training/A549_bag_of_channels_fit.yml --trainer.fast_dev_run true

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: ddp
  devices: 8
  num_nodes: 1
  precision: bf16-mixed
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: /hpc/mydata/eduardo.hirata/logs/dynaclr
      version: bag_of_channels_v1
      log_graph: false
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 5
        save_last: true
  fast_dev_run: false
  max_epochs: 150
  log_every_n_steps: 10
  enable_checkpointing: true
  inference_mode: true
  use_distributed_sampler: false
model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.contrastive.ContrastiveEncoder
      init_args:
        backbone: convnext_tiny
        in_channels: 1
        in_stack_depth: 30
        stem_kernel_size: [5, 4, 4]
        stem_stride: [5, 4, 4]
        embedding_dim: 768
        projection_dim: 32
        drop_path_rate: 0.0
    loss_function:
      class_path: viscy_models.contrastive.loss.NTXentHCL
      init_args:
        temperature: 0.2
        beta: 0.5
    lr: 0.00002
    log_batches_per_epoch: 3
    log_samples_per_batch: 3
    example_input_array_shape: [1, 1, 30, 192, 192]
data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    # ── Data source ───────────────────────────────────────────────────────────
    collection_path: applications/dynaclr/configs/collections/A549_bag_of_channels.yml
    cell_index_path: null
    # ── Patch extraction ──────────────────────────────────────────────────────
    z_window: 30
    yx_patch_size: [288, 288]
    final_yx_patch_size: [192, 192]
    channels_per_sample: 1
    # ── Train / val split ─────────────────────────────────────────────────────
    split_ratio: 0.8
    val_experiments: []
    # ── Positive pair sampling ────────────────────────────────────────────────
    tau_range: [0.5, 2.0]
    tau_decay_rate: 2.0
    # ── Batch sampling ────────────────────────────────────────────────────────
    batch_size: 64
    num_workers: 1
    batch_group_by: experiment
    stratify_by: [perturbation, organelle]
    leaky: 0.0
    temporal_enrichment: false
    seed: 0
    # ── Augmentation pipeline ─────────────────────────────────────────────────
    # No channel dropout (single channel input)
    channel_dropout_channels: []
    channel_dropout_prob: 0.0
    # Normalization: per-FOV mean/std for all channels (channel-agnostic).
    # Uses precomputed fov_statistics from zarr .zattrs.
    # TODO: switch to timepoint_statistics once computed for rechunked zarrs.
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [channel_0]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel_0]
          prob: 0.8
          scale_range: [[0.8, 1.2], [0.8, 1.2], [0.8, 1.2]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel_0]
          prob: 0.5
          gamma: [0.6, 1.6]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel_0]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel_0]
          prob: 0.5
          sigma_x: [0.25, 0.50]
          sigma_y: [0.25, 0.50]
          sigma_z: [0.0, 0.0]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel_0]
          prob: 0.5
          mean: 0.0
          std: 0.1
    cache_pool_bytes: 0
