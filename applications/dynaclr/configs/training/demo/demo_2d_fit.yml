# DynaCLR 2D bag-of-channels demo config
# =======================================
# 2D contrastive learning — single focal slice per sample.
# Uses the v3 collection (mantis infectomics only, single microscope).
#
# Usage:
#   viscy fit -c applications/dynaclr/configs/training/demo_2d_fit.yml
# Fast dev run:
#   viscy fit -c applications/dynaclr/configs/training/demo_2d_fit.yml --trainer.fast_dev_run true

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: bf16-mixed
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: /hpc/mydata/eduardo.hirata/logs/dynaclr
      version: demo_2d
      log_graph: false
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
  fast_dev_run: true
  max_epochs: 2
  log_every_n_steps: 1
  enable_checkpointing: false
  enable_model_summary: false
  inference_mode: true
  use_distributed_sampler: false
model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.contrastive.ContrastiveEncoder
      init_args:
        backbone: convnext_tiny
        in_channels: 1
        in_stack_depth: 1
        stem_kernel_size: [1, 4, 4]
        stem_stride: [1, 4, 4]
        embedding_dim: 768
        projection_dim: 32
        drop_path_rate: 0.0
    loss_function:
      class_path: viscy_models.contrastive.loss.NTXentLoss
      init_args:
        temperature: 0.2
    lr: 0.00002
    log_batches_per_epoch: 1
    log_samples_per_batch: 2
    example_input_array_shape: [1, 1, 1, 160, 160]
data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    # ── Data source ──────────────────────────────────────────────────────────
    # For production: use the full v3 collection + parquet
    # collection_path: applications/dynaclr/configs/collections/DynaCLR-2D-BagOfChannels-v3.yml
    # cell_index_path: /hpc/projects/organelle_phenotyping/models/collections/DynaCLR-2D-BagOfChannels-v3.parquet
    # For demo: single zarr, fast startup
    collection_path: null
    cell_index_path: applications/dynaclr/configs/cell_index/example_flat.parquet

    # ── Patch extraction ─────────────────────────────────────────────────────
    # z_window=1: single focal slice (2D model).
    z_window: 1
    # z_extraction_window: Z-slice augmentation for 2D models.
    #   null = extract 1 slice at focus (deterministic, no Z augmentation).
    #   e.g. 30 = extract 30 slices around focus, random crop picks 1.
    #     Each sample sees a different focal plane — teaches the model
    #     to handle focus variation across FOVs and microscopes.
    # z_extraction_window: 30
    z_extraction_window: null
    yx_patch_size: [192, 192]
    final_yx_patch_size: [160, 160]
    channels_per_sample: 1

    # ── Train / val split ────────────────────────────────────────────────────
    split_ratio: 0.8
    val_experiments: []

    # ── Positive pair sampling ───────────────────────────────────────────────
    positive_cell_source: lookup
    positive_match_columns: [lineage_id]
    tau_range: [0.5, 2.0]
    tau_decay_rate: 2.0

    # ── Batch sampling ───────────────────────────────────────────────────────
    batch_size: 8
    num_workers: 1
    batch_group_by: null
    stratify_by: [perturbation, marker]
    leaky: 0.0
    temporal_enrichment: false
    seed: 42

    # ── Augmentation pipeline ────────────────────────────────────────────────
    channel_dropout_channels: []
    channel_dropout_prob: 0.0
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [channel_0]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel_0]
          prob: 0.8
          scale_range: [[0.8, 1.3], [0.8, 1.3], [0.8, 1.3]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      - class_path: viscy_transforms.BatchedRandFlipd
        init_args:
          keys: [channel_0]
          spatial_axes: [1, 2]
          prob: 0.5
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel_0]
          prob: 0.5
          gamma: [0.6, 1.6]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel_0]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel_0]
          prob: 0.5
          sigma_x: [0.25, 0.50]
          sigma_y: [0.25, 0.50]
          sigma_z: [0.0, 0.0]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel_0]
          prob: 0.5
          mean: 0.0
          std: 0.1
    cache_pool_bytes: 0
