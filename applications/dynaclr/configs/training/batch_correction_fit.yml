# Cross-microscope batch correction finetuning configuration
# ==========================================================
# Finetunes only the projection MLP of a pretrained DynaCLR model to
# correct for microscope-specific batch effects. The stem + backbone are
# frozen; gradients only flow through the projection head.
#
# The projection head is replaced with a fresh LayerNorm-based MLP
# (better than BN when batches mix samples from different microscopes).
# The default projection_mlp uses BatchNorm — swap it here for finetuning.
#
# Requirements:
# - Two experiments from different microscopes with the same biology
# - pixel_size_xy_um and pixel_size_z_um set per experiment in the collection
# - microscope field set per experiment in the collection
#
# Key settings:
# - freeze_backbone: true — stem + encoder frozen, only projection trains
# - projection: custom MLP replaces encoder.projection at init
# - cross_scope_fraction: 0.5 — half of positives are cross-microscope
# - reference_pixel_size_* — set to one scope's pixel size for normalization
# - ckpt_path — path to pretrained DynaCLR checkpoint (loaded before projection swap)
#
# Usage:
#   dynaclr fit --config batch_correction_fit.yml

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: ddp
  devices: 1
  num_nodes: 1
  precision: 32-true
  max_epochs: 50
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: logs/batch_correction
      name: batch_correction
  use_distributed_sampler: false

model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.contrastive.ContrastiveEncoder
      init_args:
        backbone: "convnext_tiny"
        in_channels: 1
        in_stack_depth: 15
        stem_kernel_size: [3, 4, 4]
        projection_dim: 256
    loss_function:
      class_path: viscy_models.contrastive.loss.NTXentLoss
      init_args:
        temperature: 0.1        # final temperature (after annealing)
        # temperature_schedule: cosine
        # temperature_start: 0.1
        # temperature_warmup_epochs: 50
    lr: 1.0e-5
    freeze_backbone: true
    ckpt_path: <path/to/pretrained_checkpoint.ckpt>
    example_input_array_shape: [1, 1, 15, 256, 256]
    # Replace projection with a fresh LayerNorm MLP (norm="ln" avoids scope
    # contamination when batches mix samples from different microscopes).
    # in_dims must match ContrastiveEncoder.embedding_dim (default 768).
    projection:
      class_path: viscy_models.components.heads.MLP
      init_args:
        in_dims: 768
        hidden_dims: 768
        out_dims: 256
        norm: ln

data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    collection_path: <path/to/batch_correction_collection.yml>
    z_window: 15
    yx_patch_size: [288, 288]
    final_yx_patch_size: [256, 256]
    # Physical scale normalization — set to one scope's pixel size
    reference_pixel_size_xy_um: 0.2028
    reference_pixel_size_z_um: 0.5
    # Cross-scope contrastive finetuning
    cross_scope_fraction: 0.5
    hpi_window: 1.0
    # Sampling
    batch_group_by: null
    stratify_by: ["perturbation", "microscope"]
    # Training
    batch_size: 64
    num_workers: 4
    tau_range: [0.5, 2.0]
    tau_decay_rate: 2.0
    channels_per_sample: 1
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: ["channel_0"]
          level: fov_statistics
          subtrahend: median
          divisor: iqr
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: ["channel_0"]
          prob: 0.8
          rotate_range: [0.2, 0.2, 0.2]
          scale_range: [0.1, 0.1, 0.1]
          padding_mode: zeros
