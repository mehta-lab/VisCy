# DynaCLR-3D-BagOfChannels-v2
# ============================
# 3D bag-of-channels contrastive learning.
# One random fluorescence channel per sample, 32-slice Z window.
# Temporal positive pairs (same lineage at t+tau), stratified by perturbation.
#
# Augmentation pipeline:
#   extract (45,256,256) → normalize → affine → RandCrop (40,228,228)
#   → flip/contrast/noise → CenterCrop (32,160,160) [auto-appended]
#
# Launch:
#   sbatch applications/dynaclr/configs/training/DynaCLR-3D-BagOfChannels-v2.sh
#
# Resume:
#   CKPT_PATH=.../last.ckpt sbatch .../DynaCLR-3D-BagOfChannels-v2.sh

base:
  - recipes/trainer.yml
  - recipes/model/contrastive_encoder_convnext_tiny.yml

trainer:
  strategy: ddp
  devices: 2
  precision: bf16-mixed
  max_epochs: 150
  logger:
    init_args:
      project: DynaCLR-3D-BagOfChannels-v2
      name: 3d-z32-256to228to160-ntxent-t0p2
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 5
        save_last: true
    - class_path: viscy_utils.callbacks.OnlineEvalCallback
      init_args:
        every_n_epochs: 5
        label_key: perturbation
        k: 20
        track_id_key: global_track_id
        timepoint_key: t
    - class_path: viscy_utils.callbacks.SaveConfigToWandb

model:
  init_args:
    encoder:
      init_args:
        in_stack_depth: 32
        stem_kernel_size: [4, 4, 4]
        stem_stride: [4, 4, 4]
        projection_dim: 32
        drop_path_rate: 0.1
    loss_function:
      init_args:
        temperature: 0.2
    lr: 0.00002
    pca_color_keys: "[perturbation,hours_post_perturbation,experiment,marker]"
    log_negative_metrics_every_n_epochs: 2
    example_input_array_shape: [1, 1, 32, 160, 160]

data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    cell_index_path: /hpc/projects/organelle_phenotyping/models/collections/DynaCLR-3D-BagOfChannels-v2.parquet
    focus_channel: Phase3D
    reference_pixel_size_xy_um: 0.1494
    reference_pixel_size_z_um: 0.174
    z_window: 32
    z_extraction_window: 45
    z_focus_offset: 0.3
    yx_patch_size: [256, 256]
    final_yx_patch_size: [160, 160]
    channels_per_sample: 1
    positive_cell_source: lookup
    positive_match_columns: [lineage_id]
    positive_channel_source: same
    tau_range: [0.5, 2.0]
    tau_decay_rate: 2.0
    stratify_by: [perturbation]
    split_ratio: 0.8
    batch_size: 256
    num_workers: 2
    seed: 42
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [channel_0]
          level: timepoint_statistics
          subtrahend: mean
          divisor: std
    augmentations:
      - class_path: viscy_transforms.BatchedRandAffined
        init_args:
          keys: [channel_0]
          prob: 0.8
          scale_range: [[0.9, 1.1], [0.9, 1.1], [0.9, 1.1]]
          rotate_range: [3.14, 0.0, 0.0]
          shear_range: [0.05, 0.05, 0.0, 0.05, 0.0, 0.05]
      # Random crop: Z for focus invariance + YX for translation augmentation.
      # The datamodule auto-appends a CenterCrop to [32, 160, 160] after this
      # to remove rotation zero-fill artifacts at the edges.
      - class_path: viscy_transforms.BatchedRandSpatialCropd
        init_args:
          keys: [channel_0]
          roi_size: [40, 228, 228]
      - class_path: viscy_transforms.BatchedRandFlipd
        init_args:
          keys: [channel_0]
          spatial_axes: [1, 2]
          prob: 0.5
      - class_path: viscy_transforms.BatchedRandAdjustContrastd
        init_args:
          keys: [channel_0]
          prob: 0.5
          gamma: [0.6, 1.6]
      - class_path: viscy_transforms.BatchedRandScaleIntensityd
        init_args:
          keys: [channel_0]
          prob: 0.5
          factors: 0.5
      - class_path: viscy_transforms.BatchedRandGaussianSmoothd
        init_args:
          keys: [channel_0]
          prob: 0.5
          sigma_x: [0.25, 0.50]
          sigma_y: [0.25, 0.50]
          sigma_z: [0.0, 0.2]
      - class_path: viscy_transforms.BatchedRandGaussianNoised
        init_args:
          keys: [channel_0]
          prob: 0.5
          mean: 0.0
          std: 0.1
