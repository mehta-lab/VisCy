# DynaCLR shared training defaults
# ==================================
# Trainer + model scaffold shared across all contrastive training runs.
# Stack with an arch/ and data/ config, then override via CLI in slurm/.
#
# Usage:
#   viscy fit --config _base.yml --config arch/<arch>.yml --config data/<data>.yml [CLI overrides]

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: ddp
  num_nodes: 1
  precision: bf16-mixed
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 5
        save_last: true
    - class_path: viscy_utils.callbacks.OnlineEvalCallback
      init_args:
        every_n_epochs: 5
        label_key: perturbation
        k: 20
  fast_dev_run: false
  max_epochs: 150
  log_every_n_steps: 10
  # limit_train_batches: cap training batches per epoch (float=fraction, int=count).
  # limit_val_batches: cap val batches per epoch. Use with shuffle_val for large datasets.
  # limit_train_batches: 200
  # limit_val_batches: 50
  enable_checkpointing: true
  enable_model_summary: false
  inference_mode: true
  use_distributed_sampler: false
model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.contrastive.ContrastiveEncoder
      init_args:
        backbone: convnext_tiny
        embedding_dim: 768
        projection_dim: 32
        drop_path_rate: 0.1
    loss_function:
      class_path: viscy_models.contrastive.loss.NTXentLoss
      init_args:
        temperature: 0.2
    lr: 0.00002
    log_batches_per_epoch: 3
    log_samples_per_batch: 3
    log_embeddings_every_n_epochs: 10
    pca_color_keys: [perturbation]
