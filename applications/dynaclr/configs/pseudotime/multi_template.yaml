# Output lives next to each step's script folder
# Each script resolves its output dir relative to its own location
scripts_dir: applications/dynaclr/scripts/pseudotime

# Source image zarr for cell crop montages
data_zarr: /hpc/projects/intracellular_dashboard/organelle_dynamics/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV/4-phenotyping/train-test/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV_2.zarr

# Dataset definitions
# 07_24: organelles separated by well row (A=SEC61, B=TOMM20, C=G3BP1)
# 07_22: organelles mixed in C/2 — use only for template building, not per-organelle analysis
datasets:
  - &ds_07_24_g3bp1
    dataset_id: "2025_07_24_G3BP1"
    pred_dir: /hpc/projects/intracellular_dashboard/organelle_dynamics/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV/4-phenotyping/predictions/DynaCLR-2D-BagOfChannels-timeaware/v3
    annotations_path: /hpc/projects/organelle_phenotyping/datasets/annotations/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV_combined_annotations.csv
    fov_pattern: "C/2"
    control_fov_pattern: "C/1"
    frame_interval_minutes: 30

  - &ds_07_24_sec61
    dataset_id: "2025_07_24_SEC61"
    pred_dir: /hpc/projects/intracellular_dashboard/organelle_dynamics/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV/4-phenotyping/predictions/DynaCLR-2D-BagOfChannels-timeaware/v3
    annotations_path: /hpc/projects/organelle_phenotyping/datasets/annotations/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV_combined_annotations.csv
    fov_pattern: "A/2"
    control_fov_pattern: "A/1"
    frame_interval_minutes: 30

  - &ds_07_24_tomm20
    dataset_id: "2025_07_24_TOMM20"
    pred_dir: /hpc/projects/intracellular_dashboard/organelle_dynamics/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV/4-phenotyping/predictions/DynaCLR-2D-BagOfChannels-timeaware/v3
    annotations_path: /hpc/projects/organelle_phenotyping/datasets/annotations/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV_combined_annotations.csv
    fov_pattern: "B/2"
    control_fov_pattern: "B/1"
    frame_interval_minutes: 30

  - &ds_07_22
    dataset_id: "2025_07_22"
    pred_dir: /hpc/projects/intracellular_dashboard/organelle_dynamics/2025_07_22_A549_SEC61_TOMM20_G3BP1_ZIKV/4-phenotyping/predictions/DynaCLR-2D-BagOfChannels-timeaware/v3
    annotations_path: /hpc/projects/organelle_phenotyping/datasets/annotations/2025_07_22_A549_SEC61_TOMM20_G3BP1_ZIKV/2025_07_22_A549_SEC61_TOMM20_G3BP1_ZIKV_combined_annotations.csv
    fov_pattern: "C/2"
    control_fov_pattern: "C/1"
    frame_interval_minutes: 10

# Embedding zarr patterns (relative to pred_dir)
embeddings:
  sensor: "timeaware_sensor_*.zarr"
  organelle: "timeaware_organelle_*.zarr"
  phase: "timeaware_phase_*.zarr"

# Templates: only use G3BP1 wells (C/2) + 07_22 for template (annotations are on these)
templates:
  infection_nondividing:
    description: "Infection transition, non-dividing cells only (sensor embeddings)"
    embedding: sensor
    track_filter:
      infection_state: transitioning
      divides: false
    crop_window_minutes: 240
    pca_n_components: 20
    dba_max_iter: 30
    dba_tol: 1.0e-5
    dba_init: medoid
    min_track_minutes: 240
    max_tracks: 50  # no cap; set e.g. 50 to subsample
    datasets:
      - *ds_07_24_g3bp1
      - *ds_07_24_sec61
      - *ds_07_24_tomm20
      - *ds_07_22

  infection_dividing_before:
    description: "Infection transition, dividing cells that divided before infection onset"
    embedding: sensor
    track_filter:
      infection_state: transitioning
      divides: true
      division_timing: before
    crop_window_minutes: 240
    pca_n_components: 20
    dba_max_iter: 30
    dba_tol: 1.0e-5
    dba_init: medoid
    min_track_minutes: 240
    datasets:
      - *ds_07_24_g3bp1
      - *ds_07_24_sec61
      - *ds_07_24_tomm20
      - *ds_07_22

  infection_dividing_after:
    description: "Infection transition, dividing cells that divided after infection onset"
    embedding: sensor
    track_filter:
      infection_state: transitioning
      divides: true
      division_timing: after
    crop_window_minutes: 240
    pca_n_components: 20
    dba_max_iter: 30
    dba_tol: 1.0e-5
    dba_init: medoid
    min_track_minutes: 240
    datasets:
      - *ds_07_24_g3bp1
      - *ds_07_24_sec61
      - *ds_07_24_tomm20
      - *ds_07_22

# Alignment: align cells from ALL wells to infection template
# Each well row is a separate "dataset" so we get per-organelle pseudotime
alignment:
  template: infection_nondividing
  min_track_minutes: 240
  psi: null
  datasets:
    - *ds_07_24_sec61
    - *ds_07_24_tomm20
    - *ds_07_24_g3bp1

# Organelle dynamics: measure per-organelle embedding change along pseudotime
# Each dataset_id maps to a specific organelle's wells
organelle_dynamics:
  baseline_pseudotime_range: [0.0, 0.2]
  distance_metric: cosine
  time_bins_pseudotime: 20
  organelles:
    SEC61:
      embedding: organelle
      label: "SEC61 (ER)"
      color: "#1f77b4"
      dataset_ids: ["2025_07_24_SEC61"]
    TOMM20:
      embedding: organelle
      label: "TOMM20 (Mitochondria)"
      color: "#2ca02c"
      dataset_ids: ["2025_07_24_TOMM20"]
    G3BP1:
      embedding: organelle
      label: "G3BP1 (Stress Granule)"
      color: "#ff7f0e"
      dataset_ids: ["2025_07_24_G3BP1"]
    Phase:
      embedding: phase
      label: "Phase (all wells)"
      color: "#7f7f7f"
      dataset_ids: ["2025_07_24_SEC61", "2025_07_24_TOMM20", "2025_07_24_G3BP1"]
