# Evaluation config: DynaCLR-2D-MIP-BagOfChannels × infectomics-annotated (Wave 1)
# Trains LC pipelines on 14 infectomics experiments (ZIKV + DENV; G3BP1, SEC61B,
# Phase3D, viral_sensor markers). Publishes pipelines to the central LC registry.
#
# Usage:
#   nextflow run applications/dynaclr/nextflow/main.nf -entry evaluation \
#     --eval_config applications/dynaclr/configs/evaluation/DynaCLR-2D-MIP-BagOfChannels/infectomics-annotated.yaml \
#     --workspace_dir /hpc/mydata/eduardo.hirata/repos/viscy \
#     -resume

base:
  - ../recipes/predict.yml
  - ../recipes/reduce.yml
  - ../recipes/plot_infectomics.yml
  - ../recipes/linear_classifiers_infectomics.yml
  - ../recipes/infectomics-annotated.yml

training_config: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/2d-mip-ntxent-t0p2-lr2e5-bs256-192to160-zext11/DynaCLR-2D-MIP-BagOfChannels.yml
ckpt_path: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/2d-mip-ntxent-t0p2-lr2e5-bs256-192to160-zext11/DynaCLR-2D-MIP-BagOfChannels/20260403-150013/checkpoints/last.ckpt
output_dir: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/2d-mip-ntxent-t0p2-lr2e5-bs256-192to160-zext11/evaluations/infectomics-annotated/

# Publish trained LCs to the per-model + per-task-domain sub-registry.
# Atomically promotes to {publish_dir}/vN/ and updates `latest` symlink.
# Sub-registries (e.g. infectomics/, alfi/) hold pipelines that share an
# annotation domain; Wave-2 leaves choose which sub-registry to fetch.
linear_classifiers:
  publish_dir: /hpc/projects/organelle_phenotyping/models/linear_classifiers/DynaCLR-2D-MIP-BagOfChannels/infectomics/
