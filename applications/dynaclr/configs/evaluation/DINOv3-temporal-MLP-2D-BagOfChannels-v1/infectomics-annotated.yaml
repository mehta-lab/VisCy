# Evaluation config for DINOv3-temporal-MLP-2D-BagOfChannels
# Experiments: 14 infectomics experiments (ZIKV + DENV, G3BP1/SEC61B/Phase3D/viral_sensor)
#
# Usage:
#   nextflow run applications/dynaclr/nextflow/main.nf \
#     --eval_config applications/dynaclr/configs/evaluation/DINOv3-temporal-MLP-2D-BagOfChannels-v1.yaml \
#     --workspace_dir /hpc/mydata/eduardo.hirata/repos/viscy \
#     -profile local \
#     -resume

base:
  - recipes/predict.yml
  - recipes/reduce.yml
  - recipes/plot_infectomics.yml
  - recipes/linear_classifiers_infectomics.yml

training_config: /hpc/projects/organelle_phenotyping/models/DINOv3-temporal-MLP-2D-BagOfChannels/v1/config_updated.yaml
ckpt_path: /hpc/projects/organelle_phenotyping/models/DINOv3-temporal-MLP-2D-BagOfChannels/v1/DINOv3-temporal-MLP-2D-BagOfChannels-v1/20260319-235942/checkpoints/epoch=71-step=14040.ckpt
output_dir: /hpc/projects/organelle_phenotyping/models/DINOv3-temporal-MLP-2D-BagOfChannels/v1/evaluation
cell_index_path: /hpc/projects/organelle_phenotyping/models/collections/DynaCLR-BoC-lc-evaluation-v1.parquet

steps:
  - predict
  - split
  - reduce_dimensionality
  - reduce_combined
  - plot
  - smoothness
  - linear_classifiers
  - append_annotations
  - append_predictions
