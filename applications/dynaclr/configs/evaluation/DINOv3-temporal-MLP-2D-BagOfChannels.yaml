# Evaluation orchestrator config for DINOv3-temporal-MLP-2D-BagOfChannels
#
# Usage:
#   dynaclr evaluate -c applications/dynaclr/configs/evaluation/DINOv3-temporal-MLP-2D-BagOfChannels.yaml
#
# This generates per-step YAML configs + SLURM scripts under output_dir/configs/.
# After running, submit jobs with the printed chained submission command.

# === Model & Data ===
training_config: /hpc/projects/organelle_phenotyping/models/DINOv3-temporal-MLP-2D-BagOfChannels/v1/config_updated.yaml

# Path to the checkpoint to evaluate
ckpt_path: /hpc/projects/organelle_phenotyping/models/DINOv3-temporal-MLP-2D-BagOfChannels/v1/DINOv3-temporal-MLP-2D-BagOfChannels-v1/20260319-235942/checkpoints/epoch=71-step=14040.ckpt

# Override cell index parquet (null = use the one from training_config)
cell_index_path: null

# Output root. All step outputs and generated configs land here.
output_dir: /hpc/projects/organelle_phenotyping/models/DINOv3-temporal-MLP-2D-BagOfChannels/v1/evaluation

# === Steps to generate ===
# Remove any step you don't need.
steps:
  - split
  - reduce_dimensionality
  - reduce_combined
  - plot
  - smoothness
  # - linear_classifiers  # requires annotations below

# === Predict step ===
predict:
  batch_size: 400
  num_workers: 4
  precision: 32-true
  devices: 1

# === Per-experiment dimensionality reduction ===
reduce_dimensionality:
  overwrite_keys: true
  pca:
    n_components: 32
    normalize_features: true
  # PHATE skipped here — run jointly in reduce_combined instead
  # umap: null  # uncomment to enable UMAP

# === Joint dimensionality reduction across experiments ===
reduce_combined:
  overwrite_keys: true
  pca:
    n_components: 32
    normalize_features: true
  phate:
    n_components: 2
    knn: 5
    decay: 40
    scale_embeddings: false
    random_state: 42

# === Plotting step ===
plot:
  embedding_keys:
    - X_phate
    - X_pca
    - X_phate_combined
    - X_pca_combined
  color_by:
    - perturbation
    - hours_post_perturbation
    - experiment
    - marker
  point_size: 1.0
  components: [0, 1]
  format: pdf

# === SLURM configuration ===
slurm:
  gpu_partition: gpu
  cpu_partition: cpu
  gpu_mem: 112G
  cpu_mem: 128G
  gpu_time: "0-04:00:00"
  cpu_time: "0-02:00:00"
  cpus_per_task: 16
  workspace_dir: /hpc/mydata/eduardo.hirata/repos/viscy
