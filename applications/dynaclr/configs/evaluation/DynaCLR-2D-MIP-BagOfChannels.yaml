# Evaluation orchestrator config for DynaCLR-2D-MIP-BagOfChannels
#
# Usage:
#   dynaclr evaluate -c applications/dynaclr/configs/evaluation/DynaCLR-2D-MIP-BagOfChannels.yaml
#
# This generates per-step YAML configs + SLURM scripts under output_dir/configs/.
# After running, submit jobs with the printed chained submission command.

# === Model & Data ===
training_config: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/2d-mip-ntxent-t0p2-lr2e5-bs256-192to160-zext11/DynaCLR-2D-MIP-BagOfChannels.yml

# Path to the checkpoint to evaluate
ckpt_path: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/2d-mip-ntxent-t0p2-lr2e5-bs256-192to160-zext11/DynaCLR-2D-MIP-BagOfChannels/20260403-150013/checkpoints/last.ckpt

# Override cell index parquet (null = use the one from training_config)
cell_index_path: null

# Output root. All step outputs and generated configs land here.
output_dir: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/2d-mip-ntxent-t0p2-lr2e5-bs256-192to160-zext11/evaluation

# === Steps to generate ===
# Remove any step you don't need.
steps:
  - split
  - reduce_dimensionality
  - reduce_combined
  - plot
  - smoothness
  # - linear_classifiers  # requires annotations below

# === Predict step ===
predict:
  batch_size: 400
  num_workers: 4
  precision: 32-true
  devices: 1

# === Per-experiment dimensionality reduction ===
reduce_dimensionality:
  overwrite_keys: true
  pca:
    n_components: 32
    normalize_features: true
  # PHATE skipped here — run jointly in reduce_combined instead
  # umap: null  # uncomment to enable UMAP

# === Joint dimensionality reduction across experiments ===
reduce_combined:
  overwrite_keys: true
  pca:
    n_components: 32
    normalize_features: true
  phate:
    n_components: 2
    knn: 5
    decay: 40
    scale_embeddings: false
    random_state: 42

# === Plotting step ===
plot:
  embedding_keys:
    - X_phate
    - X_pca
    - X_phate_combined
    - X_pca_combined
  color_by:
    - perturbation
    - hours_post_perturbation
    - experiment
    - marker
  point_size: 1.0
  components: [0, 1]
  format: pdf

# === Linear classifiers step (optional) ===
# Requires experiment/marker in embeddings.zarr obs (re-run predict after updating pipeline).
# linear_classifiers:
#   annotations:
#     - experiment: "2025_04_22_A549_ZIKV_TOMM20"
#       path: /path/to/2025_04_22_A549_ZIKV_TOMM20/annotations.csv
#     - experiment: "2025_06_15_A549_ZIKV_SEC61B"
#       path: /path/to/2025_06_15_A549_ZIKV_SEC61B/annotations.csv
#   tasks:
#     - task: infection_state
#       marker_filters: [Phase3D]          # one run: phase channel only
#     - task: organelle_state
#       marker_filters: [TOMM20, SEC61B]   # two runs: one per marker
#     - task: infection_state              # omit marker_filters (or set null)
#       # marker_filters: null             # → one run using ALL markers combined
#   use_scaling: true
#   use_pca: false
#   split_train_data: 0.8

# === SLURM configuration ===
slurm:
  gpu_partition: gpu
  cpu_partition: cpu
  gpu_mem: 112G
  cpu_mem: 128G
  gpu_time: "0-04:00:00"
  cpu_time: "0-02:00:00"
  cpus_per_task: 16
  workspace_dir: /hpc/mydata/eduardo.hirata/repos/viscy
