# Registry for compare_evals.py — infectomics-annotated (Wave-1) cross-model comparison.
#
# Lists every model that has produced
#   {model_root}/evaluations/infectomics-annotated/linear_classifiers/metrics_summary.csv
# under /hpc/projects/organelle_phenotyping/models/. Each `name` is the legend
# label in the comparison plots; the model→color palette is built from the
# `name` strings, so keep them stable across registries when comparing the
# same model on different datasets.
#
# Status legend in comments:
#   ✅ landed — eval ran, artifacts exist
#   🔄 running / queued
#   ⬜ pending — leaf YAML exists but no run yet (uncomment after first run)
#
# Usage:
#   uv run python applications/dynaclr/scripts/evaluation/compare_evals.py \
#       -c applications/dynaclr/configs/evaluation/eval_registry_infectomics.yaml

models:
  # --- Baselines -----------------------------------------------------------
  # ✅ DINOv3-frozen — raw HF convnext-tiny, no fine-tuning, no projection
  - name: DINOv3-frozen
    eval_dir: /hpc/projects/organelle_phenotyping/models/DINOv3-frozen/evaluations/infectomics-annotated

  # ✅ DINOv3-temporal-MLP-v1 — fairly-matched SSL baseline (HF DINOv3 + MLP head)
  - name: DINOv3-temporal-MLP-v1
    eval_dir: /hpc/projects/organelle_phenotyping/models/DINOv3-temporal-MLP-2D-BagOfChannels/v1/evaluations/infectomics-annotated

  # ⬜ DynaCLR-classical — historical 150-epoch ckpt (older dataset).
  # Leaf scaffolded 2026-05-05; submit once Wave-1 head runs.
  # - name: DynaCLR-classical (historical)
  #   eval_dir: /hpc/projects/organelle_phenotyping/models/SEC61_TOMM20_G3BP1_Sensor/classical/dynaclr_gfp_rfp_ph_2D/organelle_sensor_phase_maxproj_ver1_150epochs/evaluations/infectomics-annotated

  # --- DynaCLR-2D-MIP-BagOfChannels family (BoC variant bake-off) ----------
  # ✅ Baseline: pre fix-shuffler mixed-markers, 192→160, zext11
  - name: DynaCLR-2D-BoC (192to160, zext11)
    eval_dir: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/2d-mip-ntxent-t0p2-lr2e5-bs256-192to160-zext11/evaluations/infectomics-annotated

  # ✅ Single-marker batching (batch_group_by=marker), 192→160, zext11
  - name: DynaCLR-2D-BoC (192to160, single-marker-fix)
    eval_dir: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/2d-mip-ntxent-t0p2-lr2e5-bs256-192to160-zext11-single-marker-fix-shuffler/evaluations/infectomics-annotated

  # ✅ Mixed-markers post fix-shuffler, 192→160, zext11
  - name: DynaCLR-2D-BoC (192to160, mixed-markers-fix)
    eval_dir: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/2d-mip-ntxent-t0p2-lr2e5-bs256-192to160-zext11-mixed-markers-fix-shuffler/evaluations/infectomics-annotated

  # ✅ Single-marker, larger patch (384→216→192) with zext16
  - name: DynaCLR-2D-BoC (384to192, zext16, single-marker-fix)
    eval_dir: /hpc/projects/organelle_phenotyping/models/DynaCLR-2D-MIP-BagOfChannels/2d-mip-ntxent-t0p2-lr2e5-bs256-384to192-zext16-single-marker-fix-shuffler/evaluations/infectomics-annotated

  # --- DynaCLR-2D-BagOfChannels-v3 (SEC61/TOMM20/G3BP1/Sensor, time-interval) ---
  # ✅ Legacy ContrastiveModule, wrapped via dynaclr.engine for inference
  - name: DynaCLR-2D-BagOfChannels-v3
    eval_dir: /hpc/projects/organelle_phenotyping/models/SEC61_TOMM20_G3BP1_Sensor/time_interval/dynaclr_gfp_rfp_Ph/v3/evaluations/infectomics-annotated

output_dir: /hpc/projects/organelle_phenotyping/comparisons/infectomics-annotated
fdr_threshold: 0.05
