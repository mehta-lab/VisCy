# Synthetic "training_config" for DINOv3-frozen evaluation baseline.
#
# DINOv3-frozen uses raw HuggingFace DINOv3 weights — no contrastive
# fine-tuning, no trainable projection head. Embeddings are the convnext-tiny
# backbone output (768-dim).
#
# This file is consumed by `dynaclr prepare-eval-configs` to generate a
# Lightning predict YAML. There is no Lightning checkpoint — the leaf YAML
# sets `ckpt_path: null`, so the orchestrator omits `ckpt_path` from the
# predict YAML, and DINOv3Model.__init__ pulls weights from HuggingFace.
#
# Mirrors `DINOv3-temporal-MLP-2D-BagOfChannels/v1/config_updated.yaml`
# byte-for-byte except `model.init_args.encoder.init_args.projection: null`.
# Same backbone, same data preprocessing → apples-to-apples comparison
# isolating the contribution of the trained MLP projection head.

# lightning.pytorch==2.6.1
seed_everything: 42
trainer:
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 32-true
  fast_dev_run: false
  max_epochs: 100
  log_every_n_steps: 10
  enable_checkpointing: false
  accumulate_grad_batches: 1
  inference_mode: true
model:
  class_path: dynaclr.engine.ContrastiveModule
  init_args:
    encoder:
      class_path: viscy_models.foundation.dinov3.DINOv3Model
      init_args:
        model_name: facebook/dinov3-convnext-tiny-pretrain-lvd1689m
        freeze: true
        projection: null
    loss_function:
      class_path: pytorch_metric_learning.losses.NTXentLoss
      init_args:
        temperature: 0.5
        embedding_regularizer: null
        embedding_reg_weight: 1
        reducer: null
        distance: null
        collect_stats: null
    lr: 0.0001
    schedule: Constant
    log_batches_per_epoch: 3
    log_samples_per_batch: 3
    log_embeddings_every_n_epochs: 10
    pca_color_keys: condition
    log_negative_metrics_every_n_epochs: 2
    example_input_array_shape:
    - 1
    - 1
    - 1
    - 160
    - 160
    ckpt_path: null
    freeze_backbone: false
    projection: null
data:
  class_path: dynaclr.data.datamodule.MultiExperimentDataModule
  init_args:
    cell_index_path: /hpc/projects/intracellular_dashboard/organelle_dynamics/models/DINOv3-temporal-MLP-2D-BagOfChannels/DynaCLR-2D-BagOfChannels-v3.parquet
    z_window: 1
    yx_patch_size:
    - 256
    - 256
    final_yx_patch_size:
    - 160
    - 160
    val_experiments: []
    split_ratio: 0.8
    tau_range:
    - 0.5
    - 2.0
    tau_decay_rate: 0.0
    batch_size: 256
    num_workers: 1
    stratify_by:
    - condition
    leaky: 0.0
    temporal_enrichment: false
    temporal_window_hours: 2.0
    temporal_global_fraction: 0.3
    channels_per_sample: 1
    channel_dropout_channels: null
    channel_dropout_prob: 0.0
    normalizations:
    - class_path: viscy_transforms.ScaleIntensityRangePercentilesd
      init_args:
        keys:
        - channel_0
        lower: 50.0
        upper: 99.0
        b_min: 0.0
        b_max: 1.0
        clip: false
        relative: false
        channel_wise: false
        allow_missing_keys: false
    augmentations:
    - class_path: viscy_transforms.BatchedRandAffined
      init_args:
        keys:
        - channel_0
        prob: 0.8
        rotate_range:
        - 3.14
        - 0.0
        - 0.0
        shear_range:
        - 0.05
        - 0.05
        - 0.0
        - 0.05
        - 0.0
        - 0.05
        translate_range: null
        scale_range:
        - - 0.8
          - 1.2
        - - 0.8
          - 1.2
        - - 0.8
          - 1.2
        mode: bilinear
        allow_missing_keys: false
    - class_path: viscy_transforms.BatchedRandAdjustContrastd
      init_args:
        keys:
        - channel_0
        gamma:
        - 0.8
        - 1.2
        prob: 0.5
        invert_image: false
        retain_stats: false
        allow_missing_keys: false
    - class_path: viscy_transforms.BatchedRandScaleIntensityd
      init_args:
        keys:
        - channel_0
        factors: 0.5
        prob: 0.5
        channel_wise: false
        allow_missing_keys: false
    - class_path: viscy_transforms.BatchedRandGaussianSmoothd
      init_args:
        keys:
        - channel_0
        sigma_x:
        - 0.25
        - 0.75
        sigma_y:
        - 0.25
        - 0.75
        sigma_z:
        - 0.0
        - 0.0
        truncated: 4.0
        prob: 0.5
        border_type: constant
        allow_missing_keys: false
    - class_path: viscy_transforms.BatchedRandGaussianNoised
      init_args:
        keys:
        - channel_0
        prob: 0.5
        mean: 0.0
        std: 0.2
        allow_missing_keys: false
        sample_std: true
    cache_pool_bytes: 0
    seed: 0
    include_wells: null
    exclude_fovs: null
    focus_channel: null
    reference_pixel_size_xy_um: null
    reference_pixel_size_z_um: null
optimizer: null
lr_scheduler: null
ckpt_path: null
