# 768-dim features. Publishes pipelines to the central LC registry.
#
# Usage:
#   nextflow run applications/dynaclr/nextflow/main.nf -entry evaluation \
#     --eval_config applications/dynaclr/configs/evaluation/DynaCLR-2D-BagOfChannels-v3/infectomics-annotated.yaml \
#     --workspace_dir /hpc/mydata/eduardo.hirata/repos/viscy \
#     -resume

