# Default dimensionality reduction settings for DynaCLR evaluation.
# PHATE runs only in reduce_combined; per-experiment reduce_dimensionality uses PCA only.
# Override n_jobs for reduce_combined.phate in the leaf config if needed.
reduce_dimensionality:
  overwrite_keys: true
  pca:
    n_components: 32
    normalize_features: true

reduce_combined:
  overwrite_keys: true
  pca:
    n_components: 32
    normalize_features: true
  phate:
    n_components: 2
    knn: 5
    decay: 40
    scale_embeddings: false
    random_state: 42
    n_jobs: 48
    # PHATE fits on a subsample, then transforms all cells.
    # When `lineage_id` (or fov_name+track_id) is in obs, this is a
    # **lineage** count cap — PHATE picks N whole lineages and includes
    # all timepoints. ~17k lineages across 14 infectomics experiments at
    # mean track length ~17, so 1500 lineages ≈ 25k fitting cells.
    # If lineage cols are missing, this is a **cell** count cap (random).
    subsample: 1_500
