# Default dimensionality reduction settings for DynaCLR evaluation.
# PHATE runs only in reduce_combined; per-experiment reduce_dimensionality uses PCA only.
# Override n_jobs for reduce_combined.phate in the leaf config if needed.
reduce_dimensionality:
  overwrite_keys: true
  pca:
    n_components: 32
    normalize_features: true

reduce_combined:
  overwrite_keys: true
  pca:
    n_components: 32
    normalize_features: true
  phate:
    n_components: 2
    knn: 5
    decay: 40
    scale_embeddings: false
    random_state: 42
    n_jobs: 48
    # Random subsample for fitting; PHATE then transforms all cells.
    # Reduced from default 50_000 to keep REDUCE_COMBINED under 4h on
    # ~350k-cell matrix runs. Lineage-aware subsampling is a follow-up.
    subsample: 20_000
