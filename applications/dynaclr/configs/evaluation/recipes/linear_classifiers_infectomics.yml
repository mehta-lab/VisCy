    - experiment: "2025_08_26_A549_Phase3D_ZIKV"
      path: /hpc/projects/organelle_phenotyping/datasets/annotations/2025_08_26_A549_SEC61_TOMM20_ZIKV/2025_08_26_A549_SEC61_TOMM20_ZIKV_combined_annotations.csv
  tasks:
    - task: infection_state
    - task: cell_division_state
    - task: organelle_state
      marker_filters:
        - G3BP1
        - SEC61B
    - task: cell_death_state
      marker_filters:
        - G3BP1
        - SEC61B
  use_scaling: true
  use_pca: false
  split_train_data: 0.8
  random_seed: 42
