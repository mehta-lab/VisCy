# Linear classifier settings for the infectomics benchmark.
# Covers ZIKV + DENV datasets across G3BP1, SEC61B, Phase3D, viral_sensor markers.
# Every experiment here needs an annotation CSV — when an experiment is listed
# without a matching CSV (or the CSV's tracks don't overlap the zarr obs), the
# LC step writes nothing and downstream scripts (Stage 3d label-timing) quietly
# get `predicted_* = NaN`. Add every zarr that needs predictions; missing the
# sensor-channel zarrs is how we lost ZIKV pool coverage in v1.
linear_classifiers:
  annotations:
    - experiment: "2025_01_28_A549_G3BP1_ZIKV_DENV_G3BP1"
      path: /hpc/projects/organelle_phenotyping/datasets/annotations/2025_01_28_A549_G3BP1_ZIKV_DENV/2025_01_28_A549_G3BP1_ZIKV_DENV_combined_annotations.csv
    - experiment: "2025_01_28_A549_viral_sensor_ZIKV_DENV"
      path: /hpc/projects/organelle_phenotyping/datasets/annotations/2025_01_28_A549_G3BP1_ZIKV_DENV/2025_01_28_A549_G3BP1_ZIKV_DENV_combined_annotations.csv
    - experiment: "2025_01_28_A549_Phase3D_ZIKV_DENV"
      path: /hpc/projects/organelle_phenotyping/datasets/annotations/2025_01_28_A549_G3BP1_ZIKV_DENV/2025_01_28_A549_G3BP1_ZIKV_DENV_combined_annotations.csv
    - experiment: "2025_07_24_A549_G3BP1_ZIKV"
      path: /hpc/projects/organelle_phenotyping/datasets/annotations/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV/2025_07_24_A549_SEC61_TOMM20_G3BP1_ZIKV_combined_annotations.csv
    - experiment: "2025_07_24_A549_SEC61_ZIKV"
