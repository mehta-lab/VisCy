      path: /hpc/projects/organelle_phenotyping/datasets/annotations/2024_11_07_A549_SEC61_DENV/2024_11_07_A549_SEC61B_DENV_combined_annotations.csv
    - experiment: "2025_01_24_A549_G3BP1_DENV_G3BP1"
