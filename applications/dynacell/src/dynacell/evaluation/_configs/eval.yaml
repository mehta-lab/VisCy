defaults:
  - _self_

target_name: ???
io:
  pred_path: ???
  gt_path: ???
  cell_segmentation_path: ???
  pred_channel_name: prediction
  gt_channel_name: target

pixel_metrics:
  spacing: ???
  fsc:
    bin_delta: 5
  spectral_pcc:
    bin_delta: 1.0
    tail_fraction: 0.2
    apodization: tukey
