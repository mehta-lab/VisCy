defaults:
  - _self_
  - optional target: null
  - optional predict_set: null
  # Default to the canonical DINOv3 checkpoint and team DynaCLR encoder.
  # `optional` means wheel installs that don't ship dynaclr=default (it lives
  # in the repo's shared/eval/ tree) silently skip the default — users there
  # supply their own via --config-dir.
  - optional feature_extractor/dinov3: lvd1689m
  - optional feature_extractor/dynaclr: default
  - optional feature_extractor/celldino: default
  - optional leaf: null

# Placeholder so struct-mode merges accept benchmark.dataset_ref contributions
# from target / predict_set groups. The post-compose hook in _ref_hook.py
# reads benchmark.dataset_ref and splices io.* and pixel_metrics.spacing from
# the manifest.
benchmark: null

target_name: ???

# Nucleus/membrane organelle-mask segmenter. `supermodel` = segmenter-model-zoo
# SuperModel (default, unchanged behavior). `cellpose` = GPU Cellpose-SAM + fnet
# pre/post (nucleus only). `cellpose_watershed` = whole-cell (membrane only):
# GPU Cellpose-SAM nuclei seeds + membrane EDT watershed. The cellpose /
# cellpose_watershed backends with compute_instance_ap=true add instance mAP
# (cubic average_precision) to mask_metrics; labels cache under
# instance_masks/<target>__<backend>.zarr.
segmentation:
  backend: supermodel  # supermodel | cellpose (nucleus) | cellpose_watershed (whole-cell)
  dimension: 2d        # 2d | 3d — instance backends only (3d = full-volume do_3D)
  slice_selection: frac    # frac | sharpest — picks the 2d plane (dimension=2d)
  slice_fraction: 0.30     # fractional Z depth when slice_selection=frac
  nuclei_channel_name: null  # GT-plate channel for watershed seeds (cellpose_watershed only)
  # Nucleus Cellpose-SAM params (the cellpose path + the cellpose_watershed seeds).
  cellpose:
    target_voxel_um: 0.58  # isotropic grid the nuclei are segmented on (always)
    cellprob_threshold: 0.0
    flow_threshold: 0.4
    min_obj_size: 30       # drop nuclei < N px/vox at target_voxel_um; 2D default — raise (~500) for dimension=3d
  # Whole-cell watershed stage (cellpose_watershed only). Physical-um params,
  # converted to working-grid pixels per cell_voxel_um (so they are grid-independent).
  watershed:
    cell_voxel_um: 0.3     # isotropic cell-stage grid (null = native resolution)
    close_um: 2.5          # grayscale-closing disk radius
    wall_sigma_um: 0.35    # gaussian sigma before wall thresholding
    wall_min_um: 1.0       # drop membrane-wall specks (um^ndim)
    hole_um: 3.0           # fill cell-mask holes (um^ndim)
    min_cell_um: 15.0      # drop cells below this (2D um^2 default; set ~50 um^3 for dimension=3d)
    memb_clahe: true       # CLAHE the membrane channel
    subtract_nuclei: true  # carve nuclei out -> cytoplasmic-shape-only metrics

# Whole-cell / nucleus instance average-precision. Requires an instance backend:
# (cellpose_watershed, membrane) or (cellpose, nucleus).
compute_instance_ap: false
instance_metrics:
  iou_thresholds: [0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]

io:
  pred_path: ???
  gt_path: ???
  cell_segmentation_path: null  # required iff compute_feature_metrics=true
  gt_cache_dir: null  # required for precompute-gt and require_complete_cache=true
  pred_cache_dir: null  # optional prediction-side artifact cache for masks/features
  pred_channel_name: ???  # e.g. Structure_prediction
  gt_channel_name: ???    # e.g. Structure / Membrane / Nuclei
  require_complete_cache: false  # if true, eval raises on configured cache misses instead of filling

pixel_metrics:
  spacing: ???
  fsc:
    bin_delta: 5
  spectral_pcc:
    bin_delta: 1.0
    tail_fraction: 0.2
    apodization: tukey
    nbins_low: 3

feature_metrics:
  patch_size: 256
  deep_feature_batch_threshold: 256

# Feature extractor configuration — required only when compute_feature_metrics=true
# (or when the corresponding precompute-gt build.* flag is set). Fields stay ???
# (MISSING) until then; OmegaConf resolves them lazily, so runs with feature metrics
# disabled pass right through.
feature_extractor:
  # dinov3.pretrained_model_name comes from the feature_extractor/dinov3
  # group selected via Hydra defaults above (lvd1689m -> ConvNext-Base).
  # Keep this single source of truth: do not set pretrained_model_name
  # inline here.
  dinov3: {}
  dynaclr:
    checkpoint: ???
    # Mapping of kwargs for ContrastiveEncoder (backbone, in_channels, ...).
    # No file-loading shorthand in CLI overrides today — pass an inline dict
    # or set via a Hydra config group (planned in Phase 2 of the eval refactor).
    encoder:
      backbone: convnext_tiny
      in_channels: 1
      in_stack_depth: 1
      stem_kernel_size: [1, 4, 4]
      stem_stride: [1, 4, 4]
      embedding_dim: 768
      projection_dim: 32
      drop_path_rate: 0.0
  # CELL-DINO (DINOv2 ViT-L/16 pretrained on HPA). `weights_path: null` disables.
  celldino:
    weights_path: null
    img_size: 224
    patch_size: 16

use_gpu: true
compute_microssim: true
compute_feature_metrics: true
limit_positions: null  # process first N positions; null means all

# Eval runtime / parallelism. Default is bit-for-bit-current sequential behavior.
# See applications/dynacell/CLAUDE.md "Eval runtime / parallelism" section.
runtime:
  # Outer FOV-level parallelism. 1 = current sequential behavior.
  # "auto" + executor=process clamps to min(cpu_count//4, n_positions).
  # "auto" + executor=serial resolves to 1.
  fov_workers: 1  # int | "auto"

  # BLAS/OMP/torch intra-op threads per worker process.
  # "auto" → max(1, cpu_count // resolved_fov_workers).
  threads_per_worker: "auto"  # int | "auto"

  # FOV-loop executor. "serial" runs inline; "process" uses spawn-context
  # ProcessPoolExecutor. Auto-demoted to "serial" if fov_workers resolves to 1.
  executor: "serial"  # "serial" | "process"

  # Per-T memory hygiene. Defaults set by C2 measurement (see commit log).
  # Override at runtime with DYNACELL_FORCE_PER_T_HYGIENE=1 (operator escape hatch).
  cuda_empty_cache_every_n_timepoints: 0   # 0 = off
  gc_collect_every_n_fovs: 0               # 0 = off

force_recompute:
  all: false
  gt_masks: false
  gt_cp: false
  gt_dinov3: false
  gt_dynaclr: false
  gt_celldino: false
  pred_masks: false
  pred_cp: false
  pred_dinov3: false
  pred_dynaclr: false
  pred_celldino: false
  gt_instances: false
  pred_instances: false
  final_metrics: false

save:
  save_dir: ???
  pixel_csv_filename: pixel_metrics.csv
  pixel_metrics_filename: pixel_metrics.npy
  mask_csv_filename: mask_metrics.csv
  mask_metrics_filename: mask_metrics.npy
  feature_csv_filename: feature_metrics.csv
  feature_metrics_filename: feature_metrics.npy

hydra:
  run:
    dir: .
  output_subdir: null
