model:
  class_path: dynacell.engine.DynacellFlowMatching
  init_args:
    net_config:
      input_spatial_size: [8, 512, 512]
      in_channels: 1
      dims: [64, 128, 256, 256]
      num_res_block: [2, 2, 2]
      hidden_size: 512
      num_heads: 8
      dim_head: 64
      num_hidden_layers: 8
      patch_size: 4
    transport_config:
      path_type: Linear
      prediction: velocity
    num_generate_steps: 100
    predict_method: iterative
    predict_overlap: [4, 256, 256]
    ckpt_path: {ckpt_path}

data:
  class_path: viscy_data.hcs.HCSDataModule
  init_args:
    data_path: {data_path}
    source_channel: Phase3D
    target_channel: {target_channel}
    z_window_size: 16
    batch_size: 1
    num_workers: 0
    yx_patch_size: [512, 512]
    normalizations:
      - class_path: viscy_transforms.MinMaxSampled
        init_args:
          keys: [Phase3D]
          level: timepoint_statistics
    augmentations: []

trainer:
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 32-true
  callbacks:
    - class_path: viscy_utils.callbacks.prediction_writer.HCSPredictionWriter
      init_args:
        output_store: {output_store}

return_predictions: false
