model:
  class_path: dynacell.engine.DynacellUNet
  init_args:
    architecture: FNet3D
    model_config:
      in_channels: 1
      out_channels: 1
      depth: 4
      mult_chan: 32
      in_stack_depth: 16
    predict_method: full_image
    predict_overlap: [4, 256, 256]
    ckpt_path: {ckpt_path}

data:
  class_path: viscy_data.hcs.HCSDataModule
  init_args:
    data_path: {data_path}
    source_channel: Phase3D
    target_channel: {target_channel}
    z_window_size: 16
    batch_size: 1
    num_workers: 0
    yx_patch_size: [512, 512]
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [Phase3D]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    augmentations: []

trainer:
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 32-true
  callbacks:
    - class_path: viscy_utils.callbacks.prediction_writer.HCSPredictionWriter
      init_args:
        output_store: {output_store}

return_predictions: false
