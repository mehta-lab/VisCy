# Model recipe: UNeXt2 (VSCyto3D) for z=8 input (stem=[8,4,4]).
model:
  class_path: dynacell.engine.DynacellUNet
  init_args:
    architecture: UNeXt2
    model_config:
      in_channels: 1
      out_channels: 1
      in_stack_depth: 8
      backbone: convnextv2_tiny
      stem_kernel_size: [8, 4, 4]
      decoder_mode: pixelshuffle
      head_expansion_ratio: 4
      head_pool: true
