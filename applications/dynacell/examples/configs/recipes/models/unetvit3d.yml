# Model recipe: UNetViT3D — 3D U-Net with ViT bottleneck.
model:
  class_path: dynacell.engine.DynacellUNet
  init_args:
    architecture: UNetViT3D
    model_config:
      input_spatial_size: [8, 512, 512]
      in_channels: 1
      out_channels: 1
      dims: [32, 64, 128]
      num_res_block: [2, 2]
      hidden_size: 512
      num_heads: 8
      dim_head: 64
      dropout: 0.0
      final_dropout: 0.0
      num_hidden_layers: 2
      patch_size: 4
