# Data recipe: HCSDataModule for Phase3D → Fluorescence, 3D.
data:
  class_path: viscy_data.hcs.HCSDataModule
  init_args:
    data_path: #TODO HCS OME-Zarr data
    source_channel: Phase3D
    target_channel: Fluorescence
    z_window_size: 8
    split_ratio: 0.8
    batch_size: 16
    num_workers: 8
    yx_patch_size: [512, 512]
    mmap_preload: false
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [Phase3D, Fluorescence]
          level: fov_statistics
          subtrahend: mean
          divisor: std
