# Model recipe: UNeXt2 (VSCyto3D) for z=15 input (stem=[5,4,4]).
# Matches the published VSCyto3D architecture (compmicro-czb/VSCyto3D).
model:
  class_path: dynacell.engine.DynacellUNet
  init_args:
    architecture: UNeXt2
    model_config:
      in_channels: 1
      out_channels: 1
      in_stack_depth: 15
      backbone: convnextv2_tiny
      stem_kernel_size: [5, 4, 4]
      decoder_mode: pixelshuffle
      head_expansion_ratio: 4
      head_pool: true
