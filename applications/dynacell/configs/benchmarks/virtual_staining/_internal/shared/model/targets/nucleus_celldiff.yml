# Target: nucleus (Nuclei channel of the multi-marker cell.zarr). data_path /
# source_channel / target_channel resolved from the manifest via dataset_ref.
# CellDiff variant: uses MinMaxSampled (p1/p99 → [-1,1]) instead of NormalizeSampled.
benchmark:
  target: nucleus
  gene: Nuclei
  target_id: nucleus
  dataset_ref:
    target: nucleus
data:
  init_args:
    normalizations:
      - class_path: viscy_transforms.MinMaxSampled
        init_args:
          keys: [Phase3D]
          level: timepoint_statistics
      - class_path: viscy_transforms.MinMaxSampled
        init_args:
          keys: [Nuclei]
          level: timepoint_statistics
    augmentations:
      - class_path: viscy_transforms.RandWeightedCropd
        init_args:
          keys: [Phase3D, Nuclei]
          w_key: Nuclei
          spatial_size: [13, 624, 624]
          num_samples: 2
