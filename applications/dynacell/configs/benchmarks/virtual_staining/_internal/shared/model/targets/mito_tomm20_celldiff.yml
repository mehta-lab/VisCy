# Target: mitochondria (TOMM20 marker). data_path / source_channel /
# target_channel resolved from the manifest via dataset_ref.
# CellDiff variant: uses MinMaxSampled (p1/p99 → [-1,1]) instead of NormalizeSampled.
benchmark:
  target: mito
  gene: TOMM20
  target_id: mito_tomm20
  dataset_ref:
    target: tomm20
data:
  init_args:
    normalizations:
      - class_path: viscy_transforms.MinMaxSampled
        init_args:
          keys: [Phase3D]
          level: timepoint_statistics
      - class_path: viscy_transforms.MinMaxSampled
        init_args:
          keys: [Structure]
          level: timepoint_statistics
    augmentations:
      - class_path: viscy_transforms.RandWeightedCropd
        init_args:
          keys: [Phase3D, Structure]
          w_key: Structure
          spatial_size: [13, 624, 624]
          num_samples: 2
