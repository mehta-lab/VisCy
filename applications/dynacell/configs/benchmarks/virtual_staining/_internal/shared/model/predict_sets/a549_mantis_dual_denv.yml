# Predict set: A549 mantis dual Nuclei+Membrane prediction on DENV plate.
# No dataset_ref: see predict_sets/ipsc_confocal_dual.yml for rationale.
# Phase3D is byte-equal between CAAX_DENV.ozx and H2B_DENV.ozx (verified at
# Phase 0); CAAX is the canonical pick for input source.
benchmark:
  predict_set: a549_mantis_dual_denv
data:
  class_path: viscy_data.hcs.HCSDataModule
  init_args:
    data_path: /hpc/projects/virtual_staining/training/dynacell/a549/mantis_v1/test/CAAX_DENV.ozx
    source_channel: [Phase3D]
    target_channel: [Nuclei, Membrane]
