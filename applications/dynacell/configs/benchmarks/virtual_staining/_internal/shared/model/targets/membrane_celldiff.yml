# Target: membrane (Membrane channel of the multi-marker cell.zarr). data_path /
# source_channel / target_channel resolved from the manifest via dataset_ref.
# CellDiff variant: uses MinMaxSampled (p1/p99 → [-1,1]) instead of NormalizeSampled.
benchmark:
  target: membrane
  gene: Membrane
  target_id: membrane
  dataset_ref:
    target: membrane
data:
  init_args:
    normalizations:
      - class_path: viscy_transforms.MinMaxSampled
        init_args:
          keys: [Phase3D]
          level: timepoint_statistics
      - class_path: viscy_transforms.MinMaxSampled
        init_args:
          keys: [Membrane]
          level: timepoint_statistics
    augmentations:
      - class_path: viscy_transforms.RandWeightedCropd
        init_args:
          keys: [Phase3D, Membrane]
          w_key: Membrane
          spatial_size: [13, 624, 624]
          num_samples: 2
