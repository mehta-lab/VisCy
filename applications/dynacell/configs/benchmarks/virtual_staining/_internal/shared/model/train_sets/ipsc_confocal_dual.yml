# Train set: AICS iPSC confocal, dual Nuclei+Membrane targets. Mirrors
# train_sets/ipsc_confocal.yml but bypasses the manifest resolver because
# dataset_ref.target can only carry one organelle key — the dual targets
# (Nuclei + Membrane) are inlined here.
#
# Used by Track C1 (vscyto3d_cytolandft/ipsc_confocal) and Track C2
# (vscyto3d_infectionft_dynacellft/ipsc_confocal) train leaves.
benchmark:
  train_set: ipsc_confocal
  dataset_group: aics-hipsc
data:
  class_path: viscy_data.hcs.HCSDataModule
  init_args:
    data_path: /hpc/projects/virtual_staining/training/dynacell/ipsc/dataset_v4/train/cell.zarr
    source_channel: [Phase3D]
    target_channel: [Nuclei, Membrane]
    split_ratio: 0.8
    mmap_preload: true
    scratch_dir: /dev/shm
    persistent_workers: true
