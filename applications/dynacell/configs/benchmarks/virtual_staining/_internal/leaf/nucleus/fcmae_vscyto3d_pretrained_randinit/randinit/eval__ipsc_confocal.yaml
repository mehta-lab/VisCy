# @package _global_
# Track A (random init, no training) eval for nucleus on iPSC.
# Reads the frozen-randinit predict zarr produced by
# <organelle>/fcmae_vscyto3d_pretrained/_no_train_randinit/predict__ipsc_confocal.yml.
defaults:
  - override /target: nucleus
  - override /predict_set: ipsc_confocal

io:
  pred_path: /hpc/projects/virtual_staining/training/dynacell/ipsc/predictions/nucl_fcmae_vscyto3d_pretrained_randinit.zarr

compute_feature_metrics: true
compute_instance_ap: true
segmentation:
  backend: cellpose

save:
  save_dir: /hpc/projects/virtual_staining/training/dynacell/ipsc/evaluations_randinit/eval_vscyto3d_randinit_nucleus
