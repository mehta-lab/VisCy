# @package _global_
# Track A (random init, no training) grouped eval for membrane on A549.
# One process covers mock + denv + zikv via the conditions list, amortizing the
# DINOv3 + DynaCLR + CELL-DINO load. Reads the matching frozen-randinit zarrs.
defaults:
  - override /target: membrane
  - override /predict_set: a549_mantis_caax_mock

# Base anchors to the {gene}-{first_cond} manifest; each condition overlay below
# swaps dataset, pred_path, and save_dir for mock / denv / zikv in one process.
benchmark:
  dataset_ref:
    target: caax

compute_feature_metrics: true
compute_instance_ap: true
segmentation:
  backend: cellpose_watershed
  nuclei_channel_name: Nuclei
  watershed:
    subtract_nuclei: false

conditions:
  - name: a549_mock
    benchmark:
      dataset_ref:
        dataset: a549-mantis-caax-mock
    io:
      pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/memb_fcmae_vscyto3d_pretrained_randinit_mock.zarr
      nuclei_gt_path: /hpc/projects/virtual_staining/training/dynacell/a549/mantis_v1/test/H2B_mock.ozx
    save:
      save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_randinit/eval_vscyto3d_randinit_membrane_mock
  - name: a549_denv
    benchmark:
      dataset_ref:
        dataset: a549-mantis-caax-denv
    io:
      pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/memb_fcmae_vscyto3d_pretrained_randinit_denv.zarr
      nuclei_gt_path: /hpc/projects/virtual_staining/training/dynacell/a549/mantis_v1/test/H2B_DENV.ozx
    save:
      save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_randinit/eval_vscyto3d_randinit_membrane_denv
  - name: a549_zikv
    benchmark:
      dataset_ref:
        dataset: a549-mantis-caax-zikv
    io:
      pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/memb_fcmae_vscyto3d_pretrained_randinit_zikv.zarr
      nuclei_gt_path: /hpc/projects/virtual_staining/training/dynacell/a549/mantis_v1/test/H2B_ZIKV.ozx
    save:
      save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_randinit/eval_vscyto3d_randinit_membrane_zikv
