# @package _global_
# Track A (random init, no training) grouped eval for mitochondria on A549.
# One process covers mock + denv + zikv via the conditions list, amortizing the
# DINOv3 + DynaCLR + CELL-DINO load. Reads the matching frozen-randinit zarrs.
defaults:
  - override /target: mito_tomm20
  - override /predict_set: a549_mantis_tomm20_mock

# Base anchors to the {gene}-{first_cond} manifest; each condition overlay below
# swaps dataset, pred_path, and save_dir for mock / denv / zikv in one process.
benchmark:
  dataset_ref:
    target: tomm20

compute_feature_metrics: true

conditions:
  - name: a549_mock
    benchmark:
      dataset_ref:
        dataset: a549-mantis-tomm20-mock
    io:
      pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/tomm20_fcmae_vscyto3d_pretrained_randinit_mock.zarr
    save:
      save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_with_embeddings/eval_vscyto3d_randinit_mitochondria_mock
  - name: a549_denv
    benchmark:
      dataset_ref:
        dataset: a549-mantis-tomm20-denv
    io:
      pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/tomm20_fcmae_vscyto3d_pretrained_randinit_denv.zarr
    save:
      save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_with_embeddings/eval_vscyto3d_randinit_mitochondria_denv
  - name: a549_zikv
    benchmark:
      dataset_ref:
        dataset: a549-mantis-tomm20-zikv
    io:
      pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/tomm20_fcmae_vscyto3d_pretrained_randinit_zikv.zarr
    save:
      save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_with_embeddings/eval_vscyto3d_randinit_mitochondria_zikv
