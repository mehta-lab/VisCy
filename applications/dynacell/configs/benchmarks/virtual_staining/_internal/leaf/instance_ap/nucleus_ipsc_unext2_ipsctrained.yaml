# @package _global_
# Nucleus instance-AP eval — iPSC test, UNeXt2 (fcmae_vscyto3d_scratch), iPSC-trained
# (in-distribution). 2D Cellpose-SAM nucleus instances on prediction vs GT nuclei.
# Reports AP@IoU 0.50..0.95, mAP, and instance_dice (symmetric best-Dice) into
# mask_metrics.csv. io is set explicitly (no benchmark.dataset_ref).
target_name: nucleus

segmentation:
  backend: cellpose
  dimension: 2d
  slice_fraction: 0.5   # mid-slice: iPSC cells focus mid-stack (A549-imaged data uses 0.3)

compute_instance_ap: true
compute_feature_metrics: false
compute_microssim: false
use_gpu: true

io:
  pred_path: /hpc/projects/virtual_staining/training/dynacell/ipsc/predictions/nucl_fcmae_vscyto3d_scratch.zarr
  gt_path: /hpc/projects/virtual_staining/training/dynacell/ipsc/dataset_v4/test_cropped/cell.zarr
  pred_channel_name: Nuclei_prediction
  gt_channel_name: Nuclei
  gt_cache_dir: /hpc/projects/virtual_staining/training/dynacell/ipsc/evaluations_instance_ap/nucleus_ipsc_unext2_ipsctrained/gt_cache
  pred_cache_dir: /hpc/projects/virtual_staining/training/dynacell/ipsc/evaluations_instance_ap/nucleus_ipsc_unext2_ipsctrained/pred_cache

pixel_metrics:
  spacing: [0.290, 0.108, 0.108]

save:
  save_dir: /hpc/projects/virtual_staining/training/dynacell/ipsc/evaluations_instance_ap/nucleus_ipsc_unext2_ipsctrained
