    pred_cache_dir: /tmp/reeval_probe/cache/celldiff_r2__a549_trained__a549_denv
  save:
    save_dir: /tmp/reeval_probe/out/celldiff_r2__a549_trained__a549_denv
- name: celldiff_r2_iterative__ipsc_trained__a549_denv
