# @package _global_
# Grouped probe leaf: er bucket, 6 conditions covering every code path. All save_dirs/pred_cache_dirs under /tmp/reeval_probe/ so partial runs cannot corrupt production data. Used by Step 5 of the campaign.
target_name: er
compute_feature_metrics: true
use_gpu: true
io:
  require_complete_cache: false
runtime:
  executor: serial
  fov_workers: 1
  threads_per_worker: auto
force_recompute:
  final_metrics: true
conditions:
- name: celldiff_r2__a549_trained__ipsc
  benchmark:
    dataset_ref:
      dataset: aics-hipsc
      target: sec61b
  io:
    pred_path: /hpc/projects/virtual_staining/training/dynacell/ipsc/predictions/sec61b_celldiff_r2_a549trained.zarr
    pred_cache_dir: /tmp/reeval_probe/cache/celldiff_r2__a549_trained__ipsc
  save:
    save_dir: /tmp/reeval_probe/out/celldiff_r2__a549_trained__ipsc
- name: celldiff_r2_denoise__ipsc_trained__ipsc
  benchmark:
    dataset_ref:
      dataset: aics-hipsc
      target: sec61b
  io:
    pred_path: /hpc/projects/virtual_staining/training/dynacell/ipsc/predictions/sec61b_celldiff_r2_denoise.zarr
    pred_cache_dir: /tmp/reeval_probe/cache/celldiff_r2_denoise__ipsc_trained__ipsc
  save:
    save_dir: /tmp/reeval_probe/out/celldiff_r2_denoise__ipsc_trained__ipsc
- name: vscyto3d__joint__ipsc
