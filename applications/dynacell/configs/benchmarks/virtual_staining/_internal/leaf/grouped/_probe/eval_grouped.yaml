    dataset_ref:
      dataset: aics-hipsc
      target: sec61b
  io:
    pred_path: /hpc/projects/virtual_staining/training/dynacell/ipsc/predictions/sec61b_fcmae_vscyto3d_pretrained_jointtrained.zarr
    pred_cache_dir: /tmp/reeval_probe/cache/vscyto3d__joint__ipsc
  save:
    save_dir: /tmp/reeval_probe/out/vscyto3d__joint__ipsc
- name: celldiff_r2__a549_trained__a549_denv
