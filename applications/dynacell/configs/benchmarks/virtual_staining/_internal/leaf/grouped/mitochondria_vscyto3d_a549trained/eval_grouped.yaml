# @package _global_
# Grouped leaf: mitochondria bucket, vscyto3d (fcmae_vscyto3d_pretrained) a549-trained.
# Test set: A549 mantis (mock/denv/zikv) only. iPSC has no mito ground truth
# (iPSC cell.zarr carries Nuclei/Membrane/Phase3D/Brightfield, no Structure),
# so the iPSC mito prediction cannot be scored.
# Best-val ckpt epoch=139-step=22120 from the ws8500 training run; local A40
# predicts done. Standalone leaf rather than folded into mitochondria_a549_trained
# because the canonical generator currently can't parse the dual_* zarrs on disk.
target_name: mitochondria
compute_feature_metrics: true
use_gpu: true
io:
  require_complete_cache: false
runtime:
  executor: serial
  fov_workers: 1
  threads_per_worker: auto
force_recompute:
  final_metrics: true
conditions:
- name: vscyto3d__a549_trained__a549_denv
  benchmark:
    dataset_ref:
      dataset: a549-mantis-tomm20-denv
      target: tomm20
  io:
    pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/tomm20_fcmae_vscyto3d_pretrained_a549trained_denv.zarr
    pred_cache_dir: /hpc/projects/virtual_staining/training/dynacell/a549/eval_cache_pred/a549_trained/fcmae_vscyto3d_pretrained/tomm20_denv
  save:
    save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_a549trained_with_embeddings/eval_vscyto3d_a549trained_mitochondria_denv
- name: vscyto3d__a549_trained__a549_mock
  benchmark:
    dataset_ref:
      dataset: a549-mantis-tomm20-mock
      target: tomm20
  io:
    pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/tomm20_fcmae_vscyto3d_pretrained_a549trained_mock.zarr
    pred_cache_dir: /hpc/projects/virtual_staining/training/dynacell/a549/eval_cache_pred/a549_trained/fcmae_vscyto3d_pretrained/tomm20_mock
  save:
    save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_a549trained_with_embeddings/eval_vscyto3d_a549trained_mitochondria_mock
- name: vscyto3d__a549_trained__a549_zikv
  benchmark:
    dataset_ref:
      dataset: a549-mantis-tomm20-zikv
      target: tomm20
  io:
    pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/tomm20_fcmae_vscyto3d_pretrained_a549trained_zikv.zarr
    pred_cache_dir: /hpc/projects/virtual_staining/training/dynacell/a549/eval_cache_pred/a549_trained/fcmae_vscyto3d_pretrained/tomm20_zikv
  save:
    save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_a549trained_with_embeddings/eval_vscyto3d_a549trained_mitochondria_zikv
