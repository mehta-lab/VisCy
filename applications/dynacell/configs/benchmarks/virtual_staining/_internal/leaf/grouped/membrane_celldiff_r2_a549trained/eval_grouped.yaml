# @package _global_
# Grouped leaf: membrane bucket, celldiff_r2 a549-trained model (2 conditions available now).
# iPSC + A549 denv. A549 mock/zikv predictions still in-flight — handled by membrane_celldiff_r2_a549trained_later.
target_name: membrane
compute_feature_metrics: true
use_gpu: true
io:
  require_complete_cache: false
runtime:
  executor: serial
  fov_workers: 1
  threads_per_worker: auto
force_recompute:
  final_metrics: true
conditions:
- name: celldiff_r2_a549trained__a549_trained__ipsc
  benchmark:
    dataset_ref:
      dataset: aics-hipsc
      target: membrane
  io:
    pred_path: /hpc/projects/virtual_staining/training/dynacell/ipsc/predictions/memb_celldiff_r2_a549trained.zarr
    pred_cache_dir: /hpc/projects/virtual_staining/training/dynacell/ipsc/eval_cache_pred/a549_trained/celldiff_r2_a549trained/memb_ipsc
  save:
    save_dir: /hpc/projects/virtual_staining/training/dynacell/ipsc/evaluations_a549trained_with_embeddings/eval_celldiff_r2_a549trained_membrane
- name: celldiff_r2_a549trained__a549_trained__a549_denv
  benchmark:
    dataset_ref:
      dataset: a549-mantis-caax-denv
      target: caax
  io:
    pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/memb_celldiff_r2_a549trained_denv.zarr
    pred_cache_dir: /hpc/projects/virtual_staining/training/dynacell/a549/eval_cache_pred/a549_trained/celldiff_r2_a549trained/caax_denv
  save:
    save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_a549trained_with_embeddings/eval_celldiff_r2_a549trained_membrane_denv
