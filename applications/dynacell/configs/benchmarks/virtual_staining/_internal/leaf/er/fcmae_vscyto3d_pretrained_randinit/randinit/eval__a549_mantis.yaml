# @package _global_
# Track A (random init, no training) grouped eval for er on A549.
# One process covers mock + denv + zikv via the conditions list, amortizing the
# DINOv3 + DynaCLR + CELL-DINO load. Reads the matching frozen-randinit zarrs.
defaults:
  - override /target: er_sec61b
  - override /predict_set: a549_mantis_sec61b_mock

# Base anchors to the {gene}-{first_cond} manifest; each condition overlay below
# swaps dataset, pred_path, and save_dir for mock / denv / zikv in one process.
benchmark:
  dataset_ref:
    target: sec61b

compute_feature_metrics: true

conditions:
  - name: a549_mock
    benchmark:
      dataset_ref:
        dataset: a549-mantis-sec61b-mock
    io:
      pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/sec61b_fcmae_vscyto3d_pretrained_randinit_mock.zarr
    save:
      save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_with_embeddings/eval_vscyto3d_randinit_er_mock
  - name: a549_denv
    benchmark:
      dataset_ref:
        dataset: a549-mantis-sec61b-denv
    io:
      pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/sec61b_fcmae_vscyto3d_pretrained_randinit_denv.zarr
    save:
      save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_with_embeddings/eval_vscyto3d_randinit_er_denv
  - name: a549_zikv
    benchmark:
      dataset_ref:
        dataset: a549-mantis-sec61b-zikv
    io:
      pred_path: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/sec61b_fcmae_vscyto3d_pretrained_randinit_zikv.zarr
    save:
      save_dir: /hpc/projects/virtual_staining/training/dynacell/a549/evaluations_with_embeddings/eval_vscyto3d_randinit_er_zikv
