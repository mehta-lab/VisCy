# pix2pix3d_unetvit MODERNIZED fit on membrane (Membrane marker) — joint ipsc_confocal + a549_mantis pooled, 4-GPU DDP.
#
# Finalized "Run D" recipe: modernized overlay (nonsat + R1 + G-EMA, equal LR)
# + lambda_l1=10 + LeCam gamma=0.3 + 40 epochs. Mirrors the completed nucleus
# modernized runs (same recipe, Membrane channel / CAAX store). Submit with NO overrides.
#
# Joint leaf. Uses BatchedConcatDataModule with two explicit HCSDataModule
# children (no benchmark.dataset_ref — joint leaves bypass the single-dataset
# resolver). Only model_overlays/pix2pix3d_unetvit_fit.yml is composed; the
# data block is authored inline because joint hparams live on the children.
#
# Normalization is NormalizeSampled (fov_statistics) to match the single-set
# pix2pix3d_unetvit leaves — divergent from the celldiff joint which uses
# MinMaxSampled. Per-organelle prior is to keep joint and single-set
# normalizations identical so ablations are apples-to-apples.
#
# Topology: 4-GPU H200 DDP (recipes/topology/ddp_4gpu_gan via the modernized overlay).
base:
  - ../../../_internal/shared/model/model_overlays/pix2pix3d_unetvit_fit_ddp_modernized.yml
  - ../../../_internal/shared/model/launcher_profiles/mode_fit.yml
  - ../../../_internal/shared/model/launcher_profiles/hardware_4gpu.yml
  - ../../../_internal/shared/model/launcher_profiles/runtime_shared.yml

benchmark:
  task: virtual_staining
  organelle: membrane
  gene: Membrane
  target: membrane
  target_id: membrane
  train_set: joint_ipsc_confocal_a549_mantis
  model_name: pix2pix3d_unetvit
  experiment_id: membrane__joint_ipsc_confocal_a549_mantis__pix2pix3d_unetvit_modernized

model:
  init_args:
    lambda_l1: 10.0
    lecam_gamma: 0.3

trainer:
  max_epochs: 40
  logger:
    init_args:
      name: pix2pix3d_unetvit_JOINT_MEMB_4gpu_modernized_lambdaL1_10_lecam_40ep
      save_dir: /hpc/projects/comp.micro/virtual_staining/models/cell_diff_vs_viscy/joint_ipsc_confocal_a549_mantis/memb/pix2pix3d_unetvit_modernized_lambdaL1_10_lecam_40ep
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/validate_ema
        every_n_epochs: 1
        save_top_k: 4
        save_last: true
        dirpath: /hpc/projects/comp.micro/virtual_staining/models/cell_diff_vs_viscy/joint_ipsc_confocal_a549_mantis/memb/pix2pix3d_unetvit_modernized_lambdaL1_10_lecam_40ep/checkpoints

# Child HCSDataModule init_args shared across both datasets (only data_path
# differs). `_`-prefixed top-level keys are stripped by load_composed_config
# before reaching LightningCLI; the merge expansion under `data:` survives.
_hcs_init_args: &hcs_init_args
  source_channel: Phase3D
  target_channel: Membrane
  z_window_size: 13
  # batch_size=2 + num_samples=2 → 4 GPU samples/step, matching the single-set
  # pix2pix3d_unetvit (batch=4, num_samples=2). BatchedConcatDataModule does
  # NOT divide by num_samples (see CLAUDE.md), so joint.batch_size =
  # single_set.batch_size / num_samples.
  batch_size: 2
  num_workers: 4
  yx_patch_size: [512, 512]
  split_ratio: 0.8
  mmap_preload: true
  scratch_dir: /dev/shm
  persistent_workers: true
  normalizations:
    - class_path: viscy_transforms.NormalizeSampled
      init_args:
        keys: [Phase3D]
        level: fov_statistics
        subtrahend: mean
        divisor: std
    - class_path: viscy_transforms.NormalizeSampled
      init_args:
        keys: [Membrane]
        level: fov_statistics
        subtrahend: median
        divisor: iqr
  augmentations:
    - class_path: viscy_transforms.RandWeightedCropd
      init_args:
        keys: [Phase3D, Membrane]
        w_key: Membrane
        spatial_size: [13, 624, 624]
        num_samples: 2
  gpu_augmentations:
    - class_path: viscy_transforms.BatchedRandAffined
      init_args:
        keys: [source, target]
        prob: 0.8
        rotate_range: [3.14, 0, 0]
        shear_range: [0.0, 0.05, 0.05]
        scale_range: [[0.7, 1.3], [0.5, 1.5], [0.5, 1.5]]
        safe_crop_size: [8, 512, 512]
        safe_crop_coverage: 0.9
    - class_path: viscy_transforms.BatchedCenterSpatialCropd
      init_args:
        keys: [source, target]
        roi_size: [8, 512, 512]
    - class_path: viscy_transforms.BatchedRandAdjustContrastd
      init_args:
        keys: [source]
        prob: 0.5
        gamma: [0.8, 1.2]
    - class_path: viscy_transforms.BatchedRandScaleIntensityd
      init_args:
        keys: [source]
        prob: 0.5
        factors: 0.5
    - class_path: viscy_transforms.BatchedRandGaussianNoised
      init_args:
        keys: [source]
        prob: 0.5
        mean: 0.0
        std: 0.3
    - class_path: viscy_transforms.BatchedRandGaussianSmoothd
      init_args:
        keys: [source]
        prob: 0.5
        sigma_x: [0.25, 0.75]
        sigma_y: [0.25, 0.75]
        sigma_z: [0.25, 0.75]
  val_gpu_augmentations:
    - class_path: viscy_transforms.BatchedCenterSpatialCropd
      init_args:
        keys: [source, target]
        roi_size: [8, 512, 512]

data:
  class_path: viscy_data.BatchedConcatDataModule
  init_args:
    data_modules:
      - class_path: viscy_data.hcs.HCSDataModule
        init_args:
          <<: *hcs_init_args
          data_path: /hpc/projects/virtual_staining/training/dynacell/ipsc/dataset_v4/train/cell.zarr
      - class_path: viscy_data.hcs.HCSDataModule
        init_args:
          <<: *hcs_init_args
          data_path: /hpc/projects/virtual_staining/training/dynacell/a549/mantis_v1/train/CAAX_all.zarr

launcher:
  job_name: pix2pix3d_unetvit_JOINT_MEMB_4gpu_modernized_lambdaL1_10_lecam_40ep
  run_root: /hpc/projects/comp.micro/virtual_staining/models/cell_diff_vs_viscy/joint_ipsc_confocal_a549_mantis/memb/pix2pix3d_unetvit_modernized_lambdaL1_10_lecam_40ep
  # pix2pix3d GAN (UNetViT3D G + multiscale-patch D, large 3D crops) OOMs on
  # 80 GB h100; needs h200 (141 GB). Narrow the hardware_4gpu h100|h200 default.
  sbatch:
    constraint: h200
