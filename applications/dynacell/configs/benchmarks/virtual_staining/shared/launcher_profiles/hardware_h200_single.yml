# Hardware profile: single H200 GPU. trainer.devices pairs with
# launcher.sbatch.gpus — the submit tool enforces they match.
launcher:
  sbatch:
    partition: gpu
    nodes: 1
    ntasks: 1
    cpus_per_task: 32
    gpus: 1
    mem: "256G"
    constraint: "h200"
    time: "4-00:00:00"
trainer:
  devices: 1
