# Hardware profile: single H200 GPU. Topology lives in
# recipes/topology/single_gpu.yml; pair this profile with that recipe.
# The submit tool enforces trainer.devices == launcher.sbatch.gpus.
launcher:
  sbatch:
    partition: gpu
    nodes: 1
    ntasks: 1
    cpus_per_task: 32
    gpus: 1
    mem: "256G"
    constraint: "h200"
    time: "4-00:00:00"
