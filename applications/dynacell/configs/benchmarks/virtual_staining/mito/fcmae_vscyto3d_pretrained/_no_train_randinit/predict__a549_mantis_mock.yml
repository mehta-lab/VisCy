# VSCyto3D random-init predict: mito (frozen randinit ckpt), A549 mock plate.
# Control ablation. A549 manifest keys mito by gene (`tomm20`); override the
# iPSC-side `mito_tomm20` target_id from targets/mito_tomm20.yml so the resolver finds the
# tomm20 target on a549-mantis-tomm20-mock.
base:
  - ../../../_internal/shared/model/predict_sets/a549_mantis_tomm20_mock.yml
  - ../../../_internal/shared/model/targets/mito_tomm20.yml
  - ../../../_internal/shared/model/model_overlays/fcmae_vscyto3d_predict.yml
  - ../../../_internal/shared/model/launcher_profiles/mode_predict.yml
  - ../../../_internal/shared/model/launcher_profiles/hardware_h200_single.yml
  - ../../../_internal/shared/model/launcher_profiles/runtime_shared.yml

benchmark:
  task: virtual_staining
  organelle: mito
  trained_on: randinit
  predict_set: a549_mantis_tomm20_mock
  model_name: fcmae_vscyto3d_pretrained_randinit
  experiment_id: mito__randinit__fcmae_vscyto3d_pretrained__a549_mantis_tomm20_mock
  dataset_ref:
    target: tomm20

model:
  init_args:
    ckpt_path: /hpc/projects/comp.micro/virtual_staining/models/dynacell/randinit/tomm20/fcmae_vscyto3d_pretrained/checkpoints/randinit.ckpt

data:
  init_args:
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [Phase3D]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    augmentations: []

trainer:
  callbacks:
    - class_path: viscy_utils.callbacks.prediction_writer.HCSPredictionWriter
      init_args:
        output_store: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/tomm20_fcmae_vscyto3d_pretrained_randinit_mock.zarr

launcher:
  job_name: FCMAE_VSCyto3D_RandInit_PRED_TOMM20_ON_A549_MOCK
  run_root: /hpc/projects/virtual_staining/training/dynacell/a549/predictions
