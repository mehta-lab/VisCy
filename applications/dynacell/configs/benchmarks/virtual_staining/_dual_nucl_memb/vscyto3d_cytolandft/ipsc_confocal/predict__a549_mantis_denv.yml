# vscyto3d_cytolandft (Cytoland-init + dynacell FT on iPSC) predict:
# dual nucleus+membrane on A549 denv plate. ckpt_path is filled in
# post-training from the best-val checkpoint of the matching train.yml run.
base:
  - ../../../_internal/shared/model/predict_sets/a549_mantis_dual_denv.yml
  - ../../../_internal/shared/model/targets/dual_nucl_memb.yml
  - ../../../_internal/shared/model/model_overlays/fcmae_vscyto3d_2chan_predict.yml
  - ../../../_internal/shared/model/launcher_profiles/mode_predict.yml
  - ../../../_internal/shared/model/launcher_profiles/hardware_h200_single.yml
  - ../../../_internal/shared/model/launcher_profiles/runtime_shared.yml

benchmark:
  task: virtual_staining
  organelle: dual_nucl_memb
  trained_on: ipsc_confocal
  predict_set: a549_mantis_dual_denv
  model_name: vscyto3d_cytolandft
  experiment_id: dual_nucl_memb__ipsc_confocal__vscyto3d_cytolandft__a549_mantis_denv

model:
  init_args:
    ckpt_path: REPLACE_ME_WITH_PRODUCTION_CHECKPOINT_PATH

data:
  init_args:
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [Phase3D]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    augmentations: []

trainer:
  callbacks:
    - class_path: viscy_utils.callbacks.prediction_writer.HCSPredictionWriter
      init_args:
        output_store: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/dual_nucl_memb_vscyto3d_cytolandft_denv.zarr

launcher:
  job_name: VSCyto3D_Cytoland_iPSC_PRED_DUAL_ON_A549_DENV
  run_root: /hpc/projects/virtual_staining/training/dynacell/a549/predictions
