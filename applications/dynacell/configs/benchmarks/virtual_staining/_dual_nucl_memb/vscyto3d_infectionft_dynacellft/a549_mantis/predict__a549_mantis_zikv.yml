# vscyto3d_infectionft_dynacellft (InfectionFTDynacell-init + dynacell FT on A549) predict:
# dual nucleus+membrane on A549 zikv plate. ckpt_path is filled in
# post-training from the best-val checkpoint of the matching train.yml run.
base:
  - ../../../_internal/shared/model/predict_sets/a549_mantis_dual_zikv.yml
  - ../../../_internal/shared/model/targets/dual_nucl_memb.yml
  - ../../../_internal/shared/model/model_overlays/fcmae_vscyto3d_2chan_predict.yml
  - ../../../_internal/shared/model/launcher_profiles/mode_predict.yml
  - ../../../_internal/shared/model/launcher_profiles/hardware_h200_single.yml
  - ../../../_internal/shared/model/launcher_profiles/runtime_shared.yml

benchmark:
  task: virtual_staining
  organelle: dual_nucl_memb
  trained_on: a549_mantis
  predict_set: a549_mantis_dual_zikv
  model_name: vscyto3d_infectionft_dynacellft
  experiment_id: dual_nucl_memb__a549_mantis__vscyto3d_infectionft_dynacellft__a549_mantis_zikv

model:
  init_args:
    ckpt_path: REPLACE_ME_WITH_PRODUCTION_CHECKPOINT_PATH

data:
  init_args:
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [Phase3D]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    augmentations: []

trainer:
  callbacks:
    - class_path: viscy_utils.callbacks.prediction_writer.HCSPredictionWriter
      init_args:
        output_store: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/dual_nucl_memb_vscyto3d_infectionft_dynacellft_a549trained_zikv.zarr

launcher:
  job_name: VSCyto3D_InfectionFTDynacell_A549_PRED_DUAL_ON_A549_ZIKV
  run_root: /hpc/projects/virtual_staining/training/dynacell/a549/predictions
