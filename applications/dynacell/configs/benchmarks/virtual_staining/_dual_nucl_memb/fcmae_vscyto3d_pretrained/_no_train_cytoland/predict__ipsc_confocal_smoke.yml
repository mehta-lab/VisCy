# Gate 10 smoke leaf: same as predict__ipsc_confocal.yml but writes to a
# smoke-only output_store and runs ONE batch via trainer.fast_dev_run.
# NOT FOR PRODUCTION — delete after Phase 1 gate verification.
base:
  - ../../../_internal/shared/model/predict_sets/ipsc_confocal_dual.yml
  - ../../../_internal/shared/model/targets/dual_nucl_memb.yml
  - ../../../_internal/shared/model/model_overlays/fcmae_vscyto3d_2chan_predict.yml
  - ../../../_internal/shared/model/launcher_profiles/mode_predict.yml
  - ../../../_internal/shared/model/launcher_profiles/hardware_h200_single.yml
  - ../../../_internal/shared/model/launcher_profiles/runtime_shared.yml

benchmark:
  task: virtual_staining
  organelle: dual_nucl_memb
  trained_on: cytoland
  predict_set: ipsc_confocal_dual
  model_name: fcmae_vscyto3d_pretrained_cytoland
  experiment_id: dual_nucl_memb__cytoland__fcmae_vscyto3d_pretrained__ipsc_confocal_smoke

model:
  init_args:
    ckpt_path: /hpc/projects/comp.micro/virtual_staining/datasets/public/VS_models/VSCyto3D/epoch=83-step=14532-loss=0.492.ckpt

data:
  init_args:
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [Phase3D]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    augmentations: []

trainer:
  fast_dev_run: true
  callbacks:
    - class_path: viscy_utils.callbacks.prediction_writer.HCSPredictionWriter
      init_args:
        output_store: /hpc/projects/virtual_staining/training/dynacell/ipsc/predictions/_smoke_gate10_dual_nucl_memb_cytoland.zarr

launcher:
  job_name: SMOKE_GATE10_Cytoland_PRED_DUAL
  run_root: /hpc/projects/virtual_staining/training/dynacell/ipsc/predictions
