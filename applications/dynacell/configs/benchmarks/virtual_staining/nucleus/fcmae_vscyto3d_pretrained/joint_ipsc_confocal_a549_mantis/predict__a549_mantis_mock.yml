# FCMAE_VSCyto3D_Pretrained (VSCyto3D) predict: nucleus trained on joint
# iPSC+A549, predicting against a549-mantis-h2b-mock test.
# CAVEAT: best PRE-DIVERGENCE val-loss checkpoint (epoch 62, loss/validate=0.6370)
# from job 33631899 / wandb run pq8egvjj — that run diverged to NaN after ~epoch 97
# and timed out at epoch 142/200; epoch 62 is the best usable weight. Re-train for a
# clean 200-epoch checkpoint before final benchmark numbers.
# A549 manifest keys nucleus by gene (`h2b`); override the iPSC-side `nucleus`
# target_id from targets/nucleus.yml so the resolver finds the h2b target on
# a549-mantis-h2b-mock.
base:
  - ../../../_internal/shared/model/predict_sets/a549_mantis_h2b_mock.yml
  - ../../../_internal/shared/model/targets/nucleus.yml
  - ../../../_internal/shared/model/model_overlays/fcmae_vscyto3d_predict.yml
  - ../../../_internal/shared/model/launcher_profiles/mode_predict.yml
  - ../../../_internal/shared/model/launcher_profiles/hardware_predict_any_gpu.yml
  - ../../../_internal/shared/model/launcher_profiles/runtime_shared.yml

benchmark:
  task: virtual_staining
  organelle: nucleus
  trained_on: joint_ipsc_confocal_a549_mantis
  predict_set: a549_mantis_h2b_mock
  model_name: fcmae_vscyto3d_pretrained
  experiment_id: nucleus__joint_ipsc_confocal_a549_mantis__fcmae_vscyto3d_pretrained__a549_mantis_h2b_mock
  # Override the iPSC-side `nucleus` target to a549's gene-keyed `h2b`.
  dataset_ref:
    target: h2b

model:
  init_args:
    ckpt_path: /hpc/projects/comp.micro/virtual_staining/models/dynacell/joint_ipsc_confocal_a549_mantis/nucl/fcmae_vscyto3d_pretrained/checkpoints/epoch=62-step=33390.ckpt

data:
  init_args:
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [Phase3D]
          level: fov_statistics
          subtrahend: mean
          divisor: std
    augmentations: []

trainer:
  callbacks:
    - class_path: viscy_utils.callbacks.prediction_writer.HCSPredictionWriter
      init_args:
        output_store: /hpc/projects/virtual_staining/training/dynacell/a549/predictions/nucl_fcmae_vscyto3d_pretrained_jointtrained_mock.zarr

launcher:
  job_name: FCMAE_VSCyto3D_Pretrained_PRED_NUCL_JOINTTR_MOCK
  run_root: /hpc/projects/virtual_staining/training/dynacell/a549/predictions
