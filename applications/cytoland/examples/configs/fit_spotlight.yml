# Spotlight (Kalinin et al. 2025) foreground-aware virtual staining configuration
# Usage: python -m cytoland fit --config fit_spotlight.yml
# See: https://lightning.ai/docs/pytorch/stable/cli/lightning_cli_advanced.html
#
# Spotlight is a loss function, not an architecture. It works with any model.
# This config uses FNet3D (same as the paper), but UNeXt2 or 2.5D also work.
#
# Deviations from the paper (Appendix A.3-A.4):
# - Optimizer: paper uses Adam with betas=(0.5, 0.999); this uses AdamW with
#   default betas=(0.9, 0.999). To reproduce paper results exactly, override
#   the optimizer in a custom engine or subclass.
# - Normalization: paper replaces mean with Otsu threshold as subtrahend;
#   this uses standard z-score (mean/std). The loss recomputes Otsu at forward
#   time, so this works but changes the operating point of the tunable sigmoid.
# - Patch selection: paper filters patches to ≥0.1% foreground voxels;
#   this samples all patches uniformly. All-background patches receive a
#   fallback MSE loss instead of being skipped.
# - Target normalization: paper normalizes both source and target; this config
#   only normalizes the source (Phase3D). Add the target channel to the
#   normalizations keys list to match the paper.
# - Training length: paper trains for 50k mini-batch iterations; max_epochs
#   must be calibrated based on dataset size to match.
# - Isotropic voxels: paper resizes z-stacks to 0.29x0.29x0.29 um^3 before
#   training. The data must be pre-resampled or a resizing transform added.

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: ddp
  devices: 4
  num_nodes: 1
  precision: 32-true
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: #TODO point to the path to save the logs
      version: #TODO point to the version name
      log_graph: True
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/validate
        every_n_epochs: 1
        save_top_k: 4
        save_last: true
  fast_dev_run: false
  max_epochs: 100
  log_every_n_steps: 10
  enable_checkpointing: true
  inference_mode: true
  use_distributed_sampler: true
model:
  class_path: cytoland.engine.VSUNet
  init_args:
    architecture: FNet3D
    model_config:
      in_channels: 1
      out_channels: 1
      depth: 4
      mult_chan: 32
      in_stack_depth: 32
    loss_function:
      class_path: viscy_utils.losses.SpotlightLoss
      init_args:
        lambda_mse: 0.5
        sigmoid_k: -0.95
    lr: 0.001
    schedule: Constant
data:
  class_path: viscy_data.hcs.HCSDataModule
  init_args:
    data_path: #TODO point to the path to the data
    source_channel: Phase3D
    target_channel: Fluorescence
    z_window_size: 32
    batch_size: 24
    num_workers: 8
    yx_patch_size:
      - 64
      - 64
    normalizations:
      - class_path: viscy_transforms.NormalizeSampled
        init_args:
          keys: [Phase3D]
          level: fov_statistics
          subtrahend: mean
          divisor: std
