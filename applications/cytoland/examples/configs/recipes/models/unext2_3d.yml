# Model recipe: VSCyto3D — UNeXt2 with ConvNeXt-V2 encoder, 3D (in_stack_depth=5).
# Published model: compmicro-czb/VSCyto3D
model:
  class_path: cytoland.engine.VSUNet
  init_args:
    architecture: UNeXt2
    model_config:
      in_channels: 1
      out_channels: 2
      in_stack_depth: 5
      backbone: convnextv2_tiny
      stem_kernel_size: [5, 4, 4]
      decoder_mode: pixelshuffle
      head_expansion_ratio: 4
      head_pool: true
