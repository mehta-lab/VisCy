# Model recipe: VSCyto2D — FcmaeUNet with FCMAE encoder, 2D (in_stack_depth=1).
# Published model: compmicro-czb/VSCyto2D
model:
  class_path: cytoland.engine.FcmaeUNet
  init_args:
    model_config:
      in_channels: 1
      out_channels: 2
      encoder_blocks: [3, 3, 9, 3]
      dims: [96, 192, 384, 768]
      decoder_conv_blocks: 2
      stem_kernel_size: [1, 2, 2]
      in_stack_depth: 1
      pretraining: false
