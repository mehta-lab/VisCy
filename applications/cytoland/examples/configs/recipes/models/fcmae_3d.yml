# Model recipe: FcmaeUNet with FCMAE encoder, 3D (in_stack_depth=5).
# Used for VSCyto3D pretraining and fine-tuning.
model:
  class_path: cytoland.engine.FcmaeUNet
  init_args:
    model_config:
      in_channels: 1
      out_channels: 2
      encoder_blocks: [3, 3, 9, 3]
      dims: [96, 192, 384, 768]
      decoder_conv_blocks: 2
      stem_kernel_size: [5, 4, 4]
      in_stack_depth: 5
      pretraining: false
