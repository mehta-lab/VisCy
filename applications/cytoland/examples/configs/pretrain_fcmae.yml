# FCMAE self-supervised pretraining configuration
# Usage: python -m cytoland fit --config pretrain_fcmae.yml
# See: https://lightning.ai/docs/pytorch/stable/cli/lightning_cli_advanced.html
#
# FCMAE (Fully Convolutional Masked Autoencoder) pretrains the encoder
# using a masked reconstruction objective on unlabeled phase-contrast data.
# The pretrained checkpoint can then be loaded for supervised fine-tuning
# using finetune_fcmae.yml with encoder_only: true.
#
# This config requires CombinedDataModule wrapping CachedOmeZarrDataModule(s).
# Batched GPU transforms are applied via on_after_batch_transfer().

seed_everything: 42
trainer:
  accelerator: gpu
  strategy: ddp_find_unused_parameters_true
  devices: 4
  num_nodes: 1
  precision: 16-mixed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: cytoland
      name: #TODO run name
      save_dir: #TODO point to the path to save the logs
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: loss/val
        every_n_epochs: 1
        save_top_k: 5
        save_last: true
  fast_dev_run: false
  max_epochs: 400
  log_every_n_steps: 5
  enable_checkpointing: true
  inference_mode: true
  # CachedOmeZarrDataModule handles its own ShardedDistributedSampler
  use_distributed_sampler: false
model:
  class_path: cytoland.engine.FcmaeUNet
  init_args:
    fit_mask_ratio: 0.5
    model_config:
      in_channels: 1
      out_channels: 1
      encoder_blocks: [3, 3, 9, 3]
      dims: [96, 192, 384, 768]
      decoder_conv_blocks: 1
      stem_kernel_size: [5, 4, 4]
      in_stack_depth: 15
    loss_function:
      class_path: cytoland.engine.MaskedMSELoss
    lr: 0.0002
    schedule: WarmupCosine
    log_batches_per_epoch: 3
    log_samples_per_batch: 1
data:
  class_path: viscy_data.combined.CombinedDataModule
  init_args:
    data_modules:
      # Add more CachedOmeZarrDataModule entries for multi-dataset pretraining.
      # Each dataset can have different channel names but should produce
      # the same "source" key via StackChannelsd.
      - class_path: viscy_data.gpu_aug.CachedOmeZarrDataModule
        init_args:
          data_path: #TODO point to HCS OME-Zarr data
          channels: Phase3D
          batch_size: 4
          num_workers: 6
          split_ratio: 0.8
          train_cpu_transforms:
            - class_path: viscy_transforms.NormalizeSampled
              init_args:
                keys: [Phase3D]
                level: fov_statistics
                subtrahend: mean
                divisor: std
                remove_meta: true
          val_cpu_transforms:
            - class_path: viscy_transforms.NormalizeSampled
              init_args:
                keys: [Phase3D]
                level: fov_statistics
                subtrahend: mean
                divisor: std
                remove_meta: true
          train_gpu_transforms:
            - class_path: viscy_transforms.BatchedRandAffined
              init_args:
                keys: [Phase3D]
                prob: 0.8
                rotate_range: [3.14159, 0, 0]
                scale_range: [0.2, 0.3, 0.3]
            - class_path: viscy_transforms.BatchedRandInvertIntensityd
              init_args:
                keys: [Phase3D]
                prob: 0.5
            - class_path: viscy_transforms.BatchedRandAdjustContrastd
              init_args:
                keys: [Phase3D]
                prob: 0.5
                gamma: [0.8, 1.2]
            - class_path: viscy_transforms.BatchedRandScaleIntensityd
              init_args:
                keys: [Phase3D]
                prob: 0.5
                factors: 0.5
            - class_path: viscy_transforms.BatchedRandGaussianNoised
              init_args:
                keys: [Phase3D]
                prob: 0.5
                mean: 0.0
                std: 0.3
            - class_path: viscy_transforms.BatchedRandGaussianSmoothd
              init_args:
                keys: [Phase3D]
                prob: 0.5
                sigma_x: [0.25, 0.75]
                sigma_y: [0.25, 0.75]
                sigma_z: [0.25, 0.75]
            - class_path: viscy_transforms.BatchedStackChannelsd
              init_args:
                channel_map:
                  source: [Phase3D]
          val_gpu_transforms:
            - class_path: viscy_transforms.BatchedStackChannelsd
              init_args:
                channel_map:
                  source: [Phase3D]
